<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GV마켓 운영 대시보드</title>
<style>
  :root{
    --ink:#1c2126;
    --paper:#f6f4ee;
    --line:#d9d3c4;
    --accent:#9a3b2f;
    --accent-soft:#f0e2dd;
    --good:#2f6b4f;
    --bad:#9a3b2f;
    --muted:#6b6457;
    --gv:#9a3b2f;
    --gvoff:#8a6a26;
    --shopee:#c8742a;
    --tiktok:#2b2b2b;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 20px 80px;}

  header.top{display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-logo{height:38px;width:auto;flex-shrink:0;}
  header.top .eyebrow{font-size:11px;letter-spacing:.16em;color:var(--accent);font-weight:700;text-transform:uppercase;}
  header.top h1{margin:4px 0 0;font-size:25px;font-weight:800;letter-spacing:-0.02em;}
  header.top .sub{font-size:12.5px;color:var(--muted);margin-top:4px;}
  .staff-link{font-size:12px;color:var(--muted);background:none;border:1px solid var(--line);
    border-radius:6px;padding:6px 12px;cursor:pointer;font-family:inherit;}
  .staff-link:hover{border-color:var(--ink);color:var(--ink);}

  .tabs{display:flex;gap:6px;margin-bottom:22px;}
  .tab-btn{border:1px solid var(--line);background:#fff;color:var(--muted);padding:9px 18px;
    font-size:13.5px;font-weight:700;cursor:pointer;border-radius:6px 6px 0 0;border-bottom:none;}
  .tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .page{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px 26px;max-width:900px;margin:0 auto 18px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:14px;}
  .page-eyebrow{font-size:10.5px;letter-spacing:.14em;color:var(--accent);font-weight:700;text-transform:uppercase;}
  .page-title{font-size:18px;font-weight:800;margin-top:3px;}
  .page-actions{display:flex;gap:8px;}
  .page-foot{font-size:11px;color:var(--muted);margin-top:12px;}
  .mini-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .mini-kpi-row.five{grid-template-columns:repeat(6,1fr);}
  .mini-kpi.highlight{background:var(--accent-soft);border-color:var(--accent);}
  @media print{ .mini-kpi-row.five{grid-template-columns:repeat(6,1fr);} }
  @media(max-width:760px){ .mini-kpi-row.five{grid-template-columns:repeat(3,1fr);} }
  .mini-kpi{border:1px solid var(--line);border-radius:7px;padding:8px 10px;background:var(--paper);}
  .mk-label{font-size:9.5px;color:var(--muted);font-weight:700;letter-spacing:.02em;}
  .mk-value{font-size:16px;font-weight:800;margin-top:2px;}
  .mk-delta{font-size:10.5px;font-weight:700;margin-top:1px;}
  .mk-delta.up{color:var(--good);} .mk-delta.down{color:var(--bad);} .mk-delta.flat{color:var(--muted);}
  .chan-bars.compact{margin-bottom:16px;gap:6px;}
  .chan-bars.compact .chan-bar-track{height:11px;}
  .chan-bars.compact .name{width:76px;font-size:10.5px;}
  .chan-bars.compact .val{width:150px;font-size:11px;}
  table.report.compact{font-size:11px;}
  table.report.compact th,table.report.compact td{padding:4px 6px;}
  .seg{display:flex;border:1px solid var(--ink);border-radius:7px;overflow:hidden;}
  .seg button{border:none;background:#fff;color:var(--ink);padding:7px 16px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .seg button.active{background:var(--ink);color:#fff;}

  .section{margin-bottom:34px;}
  .section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  .section-head .eyebrow{font-size:10.5px;letter-spacing:.14em;color:var(--accent);font-weight:700;text-transform:uppercase;}
  .section-head h2{margin:2px 0 0;font-size:18px;font-weight:800;}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2f9e5c;margin-right:6px;
    animation:pulse 1.8s infinite;}
  @keyframes pulse{0%{opacity:1;}50%{opacity:.35;}100%{opacity:1;}}
  .fx-badge{font-size:11px;color:var(--muted);background:var(--paper);border:1px solid var(--line);
    border-radius:20px;padding:5px 12px;font-weight:600;white-space:nowrap;}

  .live-badge-row{margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;}
  .live-badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;color:#2f9e5c;
    background:#eaf6ee;border:1px solid #bfe6cb;border-radius:20px;padding:4px 12px;}
  .fx-warning{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;color:var(--accent);
    background:var(--accent-soft);border:1px solid var(--accent);border-radius:20px;padding:4px 12px;}
  .kpi-row.live-cards{margin-bottom:14px;}
  .kpi.live-card{position:relative;border-color:#bfe6cb;box-shadow:0 0 0 1px rgba(47,158,92,.08);overflow:hidden;}
  .kpi.live-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,#2f9e5c,#7fd19a,#2f9e5c);background-size:200% 100%;
    animation:liveSweep 2.4s linear infinite;}
  @keyframes liveSweep{0%{background-position:0% 0;}100%{background-position:-200% 0;}}
  @media print{ .live-badge-row{display:none;} .kpi.live-card::before{display:none;} }

  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px 22px;margin-bottom:14px;}

  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
  .kpi-row.five{grid-template-columns:repeat(5,1fr);}
  .kpi.highlight{background:var(--accent-soft);border-color:var(--accent);}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  .kpi .label{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.03em;}
  .kpi .value{font-size:22px;font-weight:800;margin-top:5px;}
  .kpi .delta{font-size:11.5px;font-weight:700;margin-top:3px;}
  .delta.up{color:var(--good);} .delta.down{color:var(--bad);} .delta.flat{color:var(--muted);}

  .chan-bars{display:flex;flex-direction:column;gap:9px;}
  .chan-bar-row{display:flex;align-items:center;gap:10px;}
  .chan-bar-row .name{width:92px;font-size:12px;font-weight:700;flex-shrink:0;}
  .chan-bar-track{flex:1;background:#efece3;border-radius:5px;height:14px;overflow:hidden;}
  .chan-bar-fill{height:100%;border-radius:5px;}
  .chan-bar-row .val{width:150px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums;flex-shrink:0;}

  .dual-list{display:flex;flex-direction:column;gap:12px;}
  .dual-legend{font-size:10.5px;color:var(--muted);font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:5px;}
  .dual-legend .sw{display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--ink);margin-left:8px;}
  .dual-legend .sw:first-child{margin-left:0;}
  .dual-legend .sw.amt{opacity:1;}
  .dual-legend .sw.qty{opacity:.4;}
  .dual-row{display:flex;align-items:center;gap:10px;}
  .dual-name{width:92px;font-size:12px;font-weight:700;flex-shrink:0;}
  .dual-bars{flex:1;display:flex;flex-direction:column;gap:4px;}
  .dual-bar-line{display:flex;align-items:center;gap:8px;}
  .dual-track{flex:1;background:#efece3;border-radius:5px;height:10px;overflow:hidden;}
  .dual-fill{height:100%;border-radius:5px;}
  .dual-fill.amt{opacity:1;}
  .dual-fill.qty{opacity:.4;}
  .dual-val{width:90px;text-align:right;font-size:10.5px;font-variant-numeric:tabular-nums;flex-shrink:0;}
  .dual-list.compact .dual-name{width:76px;font-size:10.5px;}
  .dual-list.compact .dual-track{height:8px;}
  .dual-list.compact .dual-val{width:80px;font-size:9.5px;}
  .dual-list.compact .dual-row{gap:8px;}

  /* donut */
  .donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .donut{position:relative;border-radius:50%;flex-shrink:0;}
  .donut-hole{position:absolute;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px var(--line);}
  .donut-hole .v{font-size:18px;font-weight:800;}
  .donut-hole .l{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.02em;}
  .donut-legend{display:flex;flex-direction:column;gap:9px;flex:1;min-width:180px;}
  .donut-legend-row{display:flex;align-items:center;gap:8px;font-size:12px;}
  .donut-legend-row .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .donut-legend-row .lab{font-weight:700;width:78px;flex-shrink:0;}
  .donut-legend-row .amt{font-variant-numeric:tabular-nums;flex:1;}
  .donut-legend-row .pct{color:var(--muted);width:38px;text-align:right;font-weight:700;flex-shrink:0;}

  /* radar */
  .radar-svg{overflow:visible;}
  .radar-grid{fill:none;stroke:var(--line);stroke-width:1;}
  .radar-axis{stroke:var(--line);stroke-width:1;}
  .radar-data{fill-opacity:.28;stroke-width:2;stroke-linejoin:round;}
  .radar-label{font-size:10.5px;font-weight:700;fill:var(--muted);}

  /* trend */
  .trend-wrap{width:100%;}
  .trend-svg{display:block;}
  .trend-x-labels{display:flex;justify-content:space-between;padding:2px 4px 0;}
  .trend-x-labels span{font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap;}
  .trend-x-labels span.last{color:var(--ink);font-weight:800;}
  .multiline-legend{display:flex;gap:16px;margin-bottom:8px;flex-wrap:wrap;}
  .multiline-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted);}
  .multiline-legend-item .sw{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

  /* rank bars */
  .rank-list{display:flex;flex-direction:column;gap:11px;}
  .rank-row{display:flex;align-items:center;gap:10px;}
  .rank-no{width:18px;height:18px;border-radius:50%;background:var(--ink);color:#fff;font-size:10px;font-weight:800;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .rank-body{flex:1;}
  .rank-top{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px;}
  .rank-name{font-weight:700;}
  .rank-amt{color:var(--muted);font-variant-numeric:tabular-nums;}
  .rank-track{background:#efece3;border-radius:5px;height:9px;overflow:hidden;}
  .rank-fill{height:100%;border-radius:5px;}

  .chart-grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;align-items:center;}
  @media(max-width:760px){ .chart-grid-2{grid-template-columns:1fr;} }

  .traffic-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .traffic-cell{border:1px solid var(--line);border-radius:9px;padding:12px 14px;background:var(--paper);}
  .traffic-chan{font-size:12.5px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
  .traffic-chan .dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
  .traffic-row{display:flex;justify-content:space-between;font-size:11.5px;padding:3px 0;color:var(--muted);}
  .traffic-row b{color:var(--ink);font-variant-numeric:tabular-nums;}
  .traffic-row b.muted{color:var(--muted);font-weight:600;}
  @media(max-width:760px){ .traffic-grid{grid-template-columns:repeat(2,1fr);} }

  .glance-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:6px;}
  .glance-title{font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.02em;}
  @media(max-width:760px){ .glance-grid{grid-template-columns:1fr;} }

  table.report{width:100%;border-collapse:collapse;font-size:12px;}
  table.report th,table.report td{border:1px solid var(--line);padding:5px 7px;text-align:right;}
  table.report th{background:#efe7d8;font-weight:700;text-align:center;font-size:11px;}
  table.report td.lbl{text-align:left;font-weight:600;}
  table.report tr.grand td{background:var(--accent-soft);font-weight:800;}
  table.report tr.growth-row td{background:#fbf6ee;font-weight:700;font-style:italic;border-top:none;}
  table.report tr.subtotal td{background:#f7f0e3;font-weight:700;}
  table.report td.delta-up{color:var(--good);font-weight:700;}
  table.report td.delta-down{color:var(--bad);font-weight:700;}
  table.report .company-cell{text-align:left;font-weight:700;}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
  .toolbar select,.toolbar input[type=date]{border:1px solid var(--line);border-radius:6px;padding:7px 9px;font-size:12.5px;font-family:inherit;background:#fff;}
  .copy-btn{border:1px solid var(--ink);background:#fff;color:var(--ink);border-radius:6px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .copy-btn:hover{background:var(--ink);color:#fff;}

  .week-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;max-height:96px;overflow-y:auto;padding:4px;border:1px solid var(--line);border-radius:8px;background:var(--paper);}
  .week-chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--muted);white-space:nowrap;}
  .week-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .week-chip:hover{border-color:var(--ink);}

  .recent-feed{font-size:12.5px;}
  .recent-feed .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #efece3;}
  .recent-feed .row .meta{color:var(--muted);}
  .chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;margin-left:6px;}
  .chip.gvon{background:#f5e3df;color:var(--gv);}
  .chip.gvoff{background:#f3ead3;color:var(--gvoff);}
  .chip.shopee{background:#f7e6d2;color:var(--shopee);}
  .chip.tiktok{background:#e7e7e7;color:var(--tiktok);}

  .empty{color:var(--muted);font-size:13px;padding:16px 0;text-align:center;}
  .quiet-empty{color:var(--muted);font-size:11.5px;padding:8px 0;}
  .loading{color:var(--muted);font-size:13px;padding:18px 0;text-align:center;}

  /* staff input drawer */
  .drawer-overlay{position:fixed;inset:0;background:rgba(28,33,38,.45);z-index:40;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:#fff;z-index:41;
    box-shadow:-8px 0 24px rgba(0,0,0,.15);padding:22px;overflow-y:auto;}
  .drawer h3{margin:0 0 4px;font-size:16px;font-weight:800;}
  .drawer-divider{height:1px;background:var(--line);margin:26px 0 20px;}
  .drawer .close-btn{position:absolute;top:18px;right:18px;border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted);}
  .inv-split{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;}
  .inv-price-panel{border-right:1px solid var(--line);padding-right:18px;}
  .price-table{width:100%;}
  .price-table th{text-align:center;}
  .price-input{width:100%;border:1px solid var(--line);border-radius:5px;padding:5px 6px;font-size:11px;font-family:inherit;background:var(--paper);text-align:right;}
  .price-input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  @media(max-width:760px){ .inv-split{grid-template-columns:1fr;} .inv-price-panel{border-right:none;border-bottom:1px solid var(--line);padding-right:0;padding-bottom:16px;} }
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  .field label{font-size:11px;color:var(--muted);font-weight:600;}
  .field input,.field select{border:1px solid var(--line);border-radius:6px;padding:9px;font-size:13.5px;font-family:inherit;background:var(--paper);}
  .bulk-textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:9px;font-size:11.5px;font-family:'SF Mono',Consolas,monospace;
    background:var(--paper);resize:vertical;}
  .bulk-textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .bundle-lines{display:flex;flex-direction:column;gap:7px;margin-top:6px;}
  .bundle-line{display:grid;grid-template-columns:20px 1.3fr 1.3fr 70px 80px 24px;gap:6px;align-items:center;}
  .bundle-line select,.bundle-line input{border:1px solid var(--line);border-radius:6px;padding:7px;font-size:11.5px;font-family:inherit;background:var(--paper);}
  .bundle-line-no{width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-size:10px;font-weight:800;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .bundle-remove{border:none;background:none;color:var(--muted);cursor:pointer;font-size:14px;}
  .bundle-remove:hover{color:var(--bad);}
  .bundle-remove:disabled{opacity:.3;cursor:not-allowed;}
  .bundle-toggle{display:block;width:100%;text-align:left;border:1px dashed var(--line);background:var(--paper);
    color:var(--accent);font-weight:700;font-size:12.5px;padding:10px 12px;border-radius:8px;cursor:pointer;
    margin:8px 0 22px;}
  .bundle-toggle:hover{border-color:var(--accent);background:var(--accent-soft);}
  .bundle-panel{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px 14px 4px;margin-bottom:6px;}
  .dup-warning{background:var(--accent-soft);border:1px solid var(--accent);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--ink);margin-top:10px;}
  .bundle-panel .drawer-divider{margin:18px 0 0;background:transparent;}
  @media(max-width:480px){ .bundle-line{grid-template-columns:1fr;} }
  .submit-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:10px;font-size:13.5px;font-weight:700;cursor:pointer;margin-top:4px;}
  .submit-btn:hover{opacity:.92;}
  .hint{font-size:11px;color:var(--muted);margin-top:6px;}
  table.entries{width:100%;border-collapse:collapse;font-size:12px;margin-top:14px;}
  table.entries th{text-align:left;font-size:10.5px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line);padding:5px 6px;}
  table.entries td{padding:6px;border-bottom:1px solid #efece3;}
  .del-btn{border:none;background:none;color:var(--muted);cursor:pointer;font-size:11px;text-decoration:underline;}
  .del-btn:hover{color:var(--bad);}

  @media print{
    .no-print{display:none !important;}
    .wrap{max-width:none;padding:0;}
    @page{size:A4 portrait;margin:8mm;}
  }
  @media(max-width:760px){
    .kpi-row{grid-template-columns:repeat(2,1fr);}
    .drawer{width:100vw;}
  }
</style>
</head>
<body>
<div class="wrap" id="root"><div class="loading">불러오는 중...</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

async function lsGet(key){
  try{
    const v = localStorage.getItem(key);
    if(v===null) throw new Error('not found');
    return {value: v};
  }catch(e){ throw e; }
}
async function lsSet(key, value){
  try{ localStorage.setItem(key, value); return {key, value}; }
  catch(e){ return null; }
}

  {company:"미진 화장품", channel:"GV 온라인", qty:468, amount:845},
];
function buildSeedJanMayEntries(){
  const weeksAsc = buildWeekIndex(2026).filter(w=>w.monday<=SEED_JANMAY_CUTOFF).slice().reverse();
  const n = weeksAsc.length || 1;
  const out = [];
  SEED_JANMAY_ROWS.forEach((r,ri)=>{
    const qtyBase = Math.floor(r.qty/n), amtBase = Math.floor(r.amount/n);
    let qtyAcc=0, amtAcc=0;
    const skuObj = productsFor(r.company)[0];
    weeksAsc.forEach((w,wi)=>{
      const isLast = wi===weeksAsc.length-1;
      const qty = isLast ? (r.qty-qtyAcc) : qtyBase;
      const amount = isLast ? (r.amount-amtAcc) : amtBase;
      qtyAcc+=qty; amtAcc+=amount;
      if(qty<=0 && amount<=0) return;
      out.push({
        id:'seed-janmay-'+ri+'-'+wi,
        date:w.monday, company:r.company, channel:r.channel,
        sku:skuObj.code, skuName:skuObj.name+' (1~5월 추정 분배)',
        qty, amount,
        orderId:'SEED-'+r.company+'-'+r.channel+'-'+w.monday,
        alreadyKRW:true // 이미 원화(천원) 기준으로 입력된 과거 자료 — 환율 변환 대상 아님
      });
    });
  });
  return out;
}

const PRICED_CHANNELS = ["GV 온라인","Shopee","Tik Tok"];
function priceKey(company, sku, channel){ return company+'|'+sku+'|'+channel; }
function getPrice(prices, company, sku, channel){

function fmt(n){ return Math.round(n||0).toLocaleString('ko-KR'); }
function pad2(n){ return String(n).padStart(2,'0'); }
function iso(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function shortDate(isoStr){ const [,m,d] = isoStr.split('-'); return `${m}.${d}`; }
function todayISO(){ return iso(new Date()); }
function addDays(d,n){ const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt; }
function startOfWeekMon(d){
  const dt=new Date(d); const day=dt.getDay();
  const diff=(day===0?-6:1)-day;
  dt.setDate(dt.getDate()+diff); dt.setHours(0,0,0,0); return dt;
}
function startOfMonth(d){ return new Date(d.getFullYear(),d.getMonth(),1); }
function endOfMonth(d){ return new Date(d.getFullYear(),d.getMonth()+1,0); }
function inRange(dateStr, from, to){ return dateStr>=from && dateStr<=to; }
function pctChange(cur, prev){ if(prev===0) return cur>0?100:0; return (cur-prev)/prev*100; }
function fmtPct(p){ const sign=p>0?'+':''; return sign+p.toFixed(1)+'%'; }

function sumFor(list, filterFn){
  return list.filter(filterFn).reduce((acc,e)=>{ acc.qty+=e.qty; acc.amount+=e.amount; return acc; },{qty:0,amount:0});
}

// ---------------- 주간 고정 환율 (VND 입력 → 그 주에 잠긴 환율로 KRW 환산) ----------------
function weekMondayFor(dateStr){ return iso(startOfWeekMon(new Date(dateStr+'T00:00:00'))); }
function fridayBeforeWeek(weekMonday){ return iso(addDays(new Date(weekMonday+'T00:00:00'), -3)); }

// entry.amount(천동 입력값)를 그 주에 잠긴 환율로 천원으로 환산. 과거(alreadyKRW) 자료는 그대로 둠.
// 그 주 환율이 아직 없으면 null을 반환 — 호출부에서 "환율 미설정" 표시에 사용.
function toKRWAmount(entry, fxRates){
  if(entry.alreadyKRW) return entry.amount;
  const wk = weekMondayFor(entry.date);
  const rate = fxRates[wk];
  if(rate===undefined || rate===null) return null;
  return entry.amount * rate;
}
// 보고서/화면 표시용으로 entries 배열 전체를 환산 — 환율 미설정 주는 0으로 두고 _fxMissing 플래그를 남김(원본 entries는 보존)
function convertEntriesForDisplay(entries, fxRates){
  return entries.map(e=>{
    const converted = toKRWAmount(e, fxRates);
    if(converted===null) return {...e, amount:0, _fxMissing:true};
    return {...e, amount:converted};
  });
}

// build the company x channel report for a given current/prev/cumulative entry set
function buildReport(allEntries, from, to, prevFrom, prevTo){
  const cur = allEntries.filter(e=>inRange(e.date,from,to));
  const prev = allEntries.filter(e=>inRange(e.date,prevFrom,prevTo));
  const cumulative = allEntries;

  function rowFor(company){
    const curSub=sumFor(cur,e=>e.company===company);
    const prevSub=sumFor(prev,e=>e.company===company);
    const cumSub=sumFor(cumulative,e=>e.company===company);
    const channels=CHANNELS.map(ch=>({
      channel:ch,
      cur:sumFor(cur,e=>e.company===company&&e.channel===ch),
      prev:sumFor(prev,e=>e.company===company&&e.channel===ch),
      cum:sumFor(cumulative,e=>e.company===company&&e.channel===ch)
    }));
    return {company,curSub,prevSub,cumSub,channels};
  }
  const rows = COMPANIES.map(rowFor);
  const grandCur=sumFor(cur,()=>true);
  const grandPrev=sumFor(prev,()=>true);
  const grandCum=sumFor(cumulative,()=>true);
  const grandByChannel=CHANNELS.map(ch=>({
    channel:ch, cur:sumFor(cur,e=>e.channel===ch), prev:sumFor(prev,e=>e.channel===ch), cum:sumFor(cumulative,e=>e.channel===ch)
  }));
  return {rows,grandCur,grandPrev,grandCum,grandByChannel};
}

// list of ISO (Monday-start) weeks for a year, up to "today" (or full year if past year)
function buildWeekIndex(year){
  const today = new Date();
  const yearEnd = (year < today.getFullYear()) ? new Date(year,11,31) : today;
  let cursor = startOfWeekMon(new Date(year,0,1));
  const weeks = [];
  const monthCounters = {};
  while(cursor <= yearEnd){
    const thursday = addDays(cursor,3); // majority-of-week rule: label by the month containing Mon-Sun's midpoint
    const m = thursday.getMonth();
    monthCounters[m] = (monthCounters[m]||0)+1;
    weeks.push({
      monday: iso(cursor),
      sunday: iso(addDays(cursor,6)),
      label: `${m+1}월 ${monthCounters[m]}주차`
    });
    cursor = addDays(cursor,7);
  }
  return weeks.reverse(); // newest first
}

        const row = tmRows[ri];
        if(!row) continue;
        const rawDate = row[1];
        const ds = isoD(rawDate);
        if(!ds || ds.slice(0,4)<'2026') continue;

        const gv_v  = toN(row[2]);
        const sp_v  = toN(row[3]);
        const tt_v  = toN(row[4]);
        const gv_o  = toN(row[11]);
        const sp_o  = toN(row[12]);
        const tt_o  = toN(row[13]);

        // 주 월요일 계산
        const dt = new Date(ds+'T00:00:00');
        const wday = dt.getDay(); // 0=일
        const diff = (wday===0)?-6:1-wday;
        const mon = new Date(dt); mon.setDate(dt.getDate()+diff);
        const monStr = mon.toISOString().slice(0,10);

        // 월 마지막 날 키 (월집계용 — 월 단위 합산)
        const monthEnd = new Date(dt.getFullYear(), dt.getMonth()+1, 0);
        const meStr = monthEnd.toISOString().slice(0,10);

        // 주 단위 누적 (TOTAL_METRICS는 일별이라 주별로 합산)
        const addWeek = (ch, key, v, o)=>{
          const k = `${key}|${ch}`;
          if(!visMap[k]) visMap[k]={date:key,channel:ch,visitors:0,orders:0,isWeek:true};
          visMap[k].visitors+=v; visMap[k].orders+=o;
        };
        addWeek('GV 온라인', monStr, gv_v, gv_o);
        addWeek('Shopee',    monStr, sp_v, sp_o);
        addWeek('Tik Tok',   monStr, tt_v, tt_o);
      }

      const newVisitors = Object.values(visMap).map((v,i)=>({
        id:'xl-vis-'+i, date:v.date, channel:v.channel, visitors:v.visitors, orders:v.orders
      }));

      // ── 2) 집행결과 시트들 → 판매 entries ─────────────────────
      const CHANNEL_MAP = {'shopee':'Shopee','tik tok':'Tik Tok','gv 마켓':'GV 온라인','b2b':'B2B'};
      const COMPANY_NORM = {
        'DU 코스메틱':'DU 코스메틱','G&S':'G&S 지엔에스','G&S\n㈜지엔에스':'G&S 지엔에스',
        '한양제과':'한양제과','미진\n화장품':'미진 화장품','미진화장품':'미진 화장품',
        '순수코리아':'순수코리아','대림팜스\n(농업법인)':'대림팜스','뷰니오':'뷰니오',
        '대본\n(농업법인)\nTea Place':'대본 Tea Place','동서웰빙':'동서웰빙'
      };

      const newEntries = [];
      let entryIdx = 0;

      for(const sheetName of wb.SheetNames){
        // "26.X월 집행결과 보고(경북사무소)" 형식
        const m = sheetName.match(/26\.(\d+)월\s*집행결과/);
        if(!m) continue;
        const monthNum = parseInt(m[1]);
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

        // 주차 헤더를 찾아 각 주차 데이터 파싱
        // 주차 헤더: "YYYY.M.D.~M.D." 형태 또는 행1~48은 월집계, 이후가 주차별
        // 구조: 행4~5 헤더, 행7~ 데이터 (총합계/소계/채널별)
        // 우리는 "당월 판매" 기준(col G/H)을 주차별로 가져옴
        // 각 주차 블록: "YYYY.M.D.~M.D." 가 col A에 있는 행 다음부터 시작

        let weekBlocks = []; // {monday, startRow}
        for(let ri=0; ri<rows.length; ri++){
          const cell = rows[ri] && rows[ri][0];
          if(typeof cell==='string'){
            // 주차 헤더 패턴: "2026.6.1.~6.7."
            const wm = cell.match(/2026\.(\d+)\.(\d+)\./);
            if(wm){
              const mo=parseInt(wm[1]), dy=parseInt(wm[2]);
              const dt = new Date(2026,mo-1,dy);
              const wday=dt.getDay(); const diff=(wday===0)?-6:1-wday;
              const mon=new Date(dt); mon.setDate(dt.getDate()+diff);
              weekBlocks.push({monday:mon.toISOString().slice(0,10), startRow:ri+1});
            }
          }
        }

        // 각 주차 블록 파싱
        for(let bi=0; bi<weekBlocks.length; bi++){
          const {monday, startRow} = weekBlocks[bi];
          const endRow = bi+1<weekBlocks.length ? weekBlocks[bi+1].startRow-1 : rows.length;
          let curCompany = null;

          for(let ri=startRow; ri<endRow; ri++){
            const row = rows[ri]; if(!row) continue;
            const colA = row[0]; // 업체명
            const colD = row[3]; // 채널
            const colG = row[6]; // 당월 수량
            const colH = row[7]; // 당월 금액(천원)

            if(colA && typeof colA==='string' && colA.trim() && colA.trim()!=='합계' && colA.trim()!=='업체명'){
              const norm = COMPANY_NORM[colA.trim()];
              if(norm) curCompany=norm;
            }
            if(!curCompany) continue;
            if(!colD || typeof colD!=='string') continue;
            const chKey = colD.trim().toLowerCase();
            const ch = CHANNEL_MAP[chKey];
            if(!ch) continue;
            const qty = toN(colG);
            const amt = toN(colH);
            if(qty===0 && amt===0) continue;

            newEntries.push({
              id:'xl-'+entryIdx++,
              date:monday, company:curCompany, channel:ch,
              sku:'BULK', skuName:`${curCompany} ${ch} (엑셀 주간 집계)`,
              qty, amount:amt,
              alreadyKRW:true,
              noOrderData:true,
              orderId:'XL-'+curCompany+'-'+ch+'-'+monday
            });
          }
        }
      }

      // storage 덮어쓰기
      await lsSet('gv-visitors', JSON.stringify(newVisitors));
      await lsSet('gv-entries', JSON.stringify(newEntries));
      await loadEntries(); await loadVisitors();
      setUploadMsg({type:'ok', text:`✅ 완료! 판매 ${newEntries.length}건 / 방문자 ${newVisitors.length}개 채널-주차 반영됨`});
    }catch(err){
      setUploadMsg({type:'err', text:'❌ 오류: '+(err && err.message ? err.message : String(err))});
    }
    setUploading(false);
    if(xlsxInputRef.current) xlsxInputRef.current.value='';
  }

  return (
    <div>
      <header className="top">
        <div className="brand">
          <img src={LOGO_DATA_URI} alt="GV market" className="brand-logo"/>
          <div>
            <div className="eyebrow">경북도 · GV마켓 운영</div>
            <h1>GV마켓 운영 대시보드</h1>
            <div className="sub">실시간 현황 · 월별 · 주간 집행결과를 한눈에 확인합니다</div>
          </div>
        </div>
        <div className="no-print" style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
          <div style={{display:'flex',gap:8}}>
            <button className="staff-link" style={{background:'#1a6fc4',color:'#fff',borderColor:'#1a6fc4'}}
              disabled={uploading} onClick={()=>xlsxInputRef.current && xlsxInputRef.current.click()}>
              {uploading ? '처리 중...' : '📂 엑셀 업로드'}
            </button>
            <input ref={xlsxInputRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleXlsxUpload}/>
            <button className="staff-link" onClick={()=>setInvOpen(true)}>재고 확인</button>
            <button className="staff-link" onClick={()=>setDrawerOpen(true)}>+ 직원 입력</button>
          </div>
          {uploadMsg && <div style={{fontSize:'11px',color:uploadMsg.type==='err'?'var(--bad)':'var(--good)',maxWidth:340,textAlign:'right'}}>{uploadMsg.text}</div>}
        </div>
      </header>

      <div className="tabs no-print">
        <button className={"tab-btn "+(tab==='live'?'active':'')} onClick={()=>setTab('live')}>① 실시간 현황판</button>
        <button className={"tab-btn "+(tab==='monthly'?'active':'')} onClick={()=>setTab('monthly')}>② 월별 집행결과 보고서</button>
        <button className={"tab-btn "+(tab==='weekly'?'active':'')} onClick={()=>setTab('weekly')}>③ 주간 집행결과 보고서</button>
        <button className={"tab-btn "+(tab==='log'?'active':'')} onClick={()=>setTab('log')}>④ 거래 로그</button>
      </div>

      {entries===null ? (
        <div className="loading">데이터 불러오는 중...</div>
      ) : (
      <React.Fragment>
        <div style={tab==='live'?{}:{display:'none'}}>
          <LiveSection entries={displayEntries} visitors={safeVisitors} year={currentYear}/>
          <MonthlySection entries={displayEntries} visitors={safeVisitors} year={currentYear}/>
          <WeeklySection entries={displayEntries} visitors={safeVisitors} year={currentYear}/>
        </div>
        <div style={tab==='monthly'?{}:{display:'none'}}>

      {drawerOpen && (
        <React.Fragment>

          <StaffDrawer entries={safeEntries} persist={persist} visitors={safeVisitors} persistVisitors={persistVisitors}
            stockIn={safeStockIn} persistStockIn={persistStockIn} prices={safePrices} onClose={()=>setDrawerOpen(false)}/>

  );
}

// ---------------- DONUT CHART ----------------
function DonutChart({segments, centerLabel, centerValue, size, unit}){
  unit = unit || '천원';
  size = size || 150;
  const total = segments.reduce((s,x)=>s+x.amount,0);
  let acc = 0;
  const stops = segments.map(s=>{
    const start = total>0 ? acc/total*100 : 0;
    acc += s.amount;
    const end = total>0 ? acc/total*100 : 0;
    return `${s.color} ${start}% ${end}%`;
  });
  const bg = total>0 ? `conic-gradient(${stops.join(',')})` : '#efece3';
  return (
    <div className="donut-wrap">
      <div className="donut" style={{width:size,height:size,background:bg}}>
        <div className="donut-hole" style={{inset:size*0.16}}>
          <div className="v">{fmt(centerValue)}</div>
          <div className="l">{centerLabel}</div>
        </div>
      </div>
      <div className="donut-legend">
        {segments.map(s=>(
          <div className="donut-legend-row" key={s.name}>
            <span className="dot" style={{background:s.color}}></span>
            <span className="lab">{s.name}</span>
            <span className="amt">{fmt(s.amount)}{unit}</span>
            <span className="pct">{total>0?Math.round(s.amount/total*100):0}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------- RADAR CHART (4-axis channel balance) ----------------
function RadarChart({axes, color, size}){
  size = size || 220;
  const R = size/2 - 36, cx = size/2, cy = size/2;
  const n = axes.length;
  const maxVal = Math.max(1, ...axes.map(a=>a.value));
  const pt = (v,i)=>{
    const angle = -Math.PI/2 + i*(2*Math.PI/n);
    const r = (v/maxVal)*R;
    return [cx+r*Math.cos(angle), cy+r*Math.sin(angle)];
  };
  const dataPts = axes.map((a,i)=>pt(a.value,i));
  const dataPath = dataPts.map(p=>p.join(',')).join(' ');
  const rings = [0.25,0.5,0.75,1].map(f=>
    axes.map((a,i)=>pt(maxVal*f,i)).map(p=>p.join(',')).join(' ')
  );
  return (
    <svg width={size} height={size} className="radar-svg">
      {rings.map((ring,i)=><polygon key={i} points={ring} className="radar-grid"/>)}
      {axes.map((a,i)=>{
        const [ax,ay] = pt(maxVal,i);
        return <line key={i} x1={cx} y1={cy} x2={ax} y2={ay} className="radar-axis"/>;
      })}
      <polygon points={dataPath} className="radar-data" style={{fill:color, stroke:color}}/>
      {axes.map((a,i)=>{
        const [lx,ly] = pt(maxVal*1.28,i);
        return <text key={i} x={lx} y={ly} className="radar-label" textAnchor="middle" dominantBaseline="middle">{a.label}</text>;
      })}
    </svg>
  );
}

// ---------------- TREND AREA (smooth line + gradient fill) ----------------
function TrendArea({points, color, height}){
  height = height || 130;
  const width = 600;
  const pad = 20;
  const max = Math.max(1, ...points.map(p=>p.value));
  const stepX = points.length>1 ? (width-pad*2)/(points.length-1) : 0;
  const coords = points.map((p,i)=>{
    const x = pad + i*stepX;
    const y = height-pad - (p.value/max)*(height-pad*2);
    return [x,y];
  });
  function smoothPath(pts){
    if(pts.length<2) return '';
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for(let i=0;i<pts.length-1;i++){
      const [x0,y0]=pts[i], [x1,y1]=pts[i+1];
      const mx=(x0+x1)/2, my=(y0+y1)/2;
      d += ` Q ${x0},${y0} ${mx},${my}`;
    }
    const last = pts[pts.length-1];
    d += ` L ${last[0]},${last[1]}`;
    return d;
  }
  const linePath = smoothPath(coords);
  const areaPath = `${linePath} L ${coords[coords.length-1][0]},${height-pad} L ${coords[0][0]},${height-pad} Z`;
  const gid = 'trendGrad'+Math.round(max);
  return (
    <div className="trend-wrap">
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" className="trend-svg">
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={areaPath} fill={`url(#${gid})`} stroke="none"/>
        <path d={linePath} fill="none" stroke={color} strokeWidth="2.5"/>
        {coords.map((c,i)=>(
          <circle key={i} cx={c[0]} cy={c[1]} r={i===coords.length-1?4:2.5} fill={color}/>
        ))}
      </svg>
      <div className="trend-x-labels">
        {points.map((p,i)=>(
          <span key={i} className={i===points.length-1?'last':''}>{p.label}</span>
        ))}
      </div>
    </div>
  );
}

// ---------------- MULTI-LINE GROWTH TREND (indexed, base week = 100) ----------------
function MultiLineTrend({series, points, height}){
  // series: [{name, color, values:[number,...]}], points: [{label}] shared x-axis labels
  height = height || 170;
  const width = 600;
  const pad = 20;
  const allVals = series.flatMap(s=>s.values);
  const max = Math.max(10, ...allVals);
  const min = Math.min(0, ...allVals);
  const span = Math.max(1, max-min);
  const n = points.length;
  const stepX = n>1 ? (width-pad*2)/(n-1) : 0;
  function coordsFor(values){
    return values.map((v,i)=>{
      const x = pad + i*stepX;
      const y = height-pad - ((v-min)/span)*(height-pad*2);
      return [x,y];
    });
  }
  function smoothPath(pts){
    if(pts.length<2) return '';
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for(let i=0;i<pts.length-1;i++){
      const [x0,y0]=pts[i], [x1,y1]=pts[i+1];
      const mx=(x0+x1)/2, my=(y0+y1)/2;
      d += ` Q ${x0},${y0} ${mx},${my}`;
    }
    const last = pts[pts.length-1];
    d += ` L ${last[0]},${last[1]}`;
    return d;
  }
  return (
    <div className="trend-wrap">
      <div className="multiline-legend">
        {series.map(s=>(
          <span key={s.name} className="multiline-legend-item"><span className="sw" style={{background:s.color}}></span>{s.name}</span>
        ))}
      </div>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" className="trend-svg">
        {series.map(s=>{
          const coords = coordsFor(s.values);
          const path = smoothPath(coords);
          return (
            <g key={s.name}>
              <path d={path} fill="none" stroke={s.color} strokeWidth="2.5"/>
              {coords.map((c,i)=>(
                <circle key={i} cx={c[0]} cy={c[1]} r={i===coords.length-1?4:2.2} fill={s.color}/>
              ))}
            </g>
          );
        })}
      </svg>
      <div className="trend-x-labels">
        {points.map((p,i)=>(
          <span key={i} className={i===points.length-1?'last':''}>{p.label}</span>
        ))}
      </div>
    </div>
  );
}

// ---------------- GROWTH RATE CARD (전기간 대비 %) ----------------
function GrowthCard({label, current, previous, suffix, periodLabel}){
  const diff = current-previous;
  const pct = previous>0 ? (diff/previous*100) : (current>0?100:0);
  const dir = diff>0?'up':diff<0?'down':'flat';
  const sign = diff>0?'+':'';
  return (
    <div className="kpi">
      <div className="label">{label}</div>
      <div className="value">{fmt(current)}{suffix}</div>
      <div className={"delta "+dir}>
        {dir==='flat' ? `${periodLabel||'전월'} 대비 변동 없음` : `${sign}${fmt(diff)}${suffix} (${sign}${pct.toFixed(1)}%) ${periodLabel||'전월'} 대비`}
      </div>
    </div>
  );
}

function LiveSection({entries, visitors, year}){
  const yearEntries = useMemo(()=>entries.filter(e=>e.date.slice(0,4)===String(year)),[entries,year]);
  const yearVisitors = useMemo(()=>(visitors||[]).filter(v=>v.date.slice(0,4)===String(year)),[visitors,year]);
  const totals = useMemo(()=>sumFor(yearEntries,()=>true),[yearEntries]);
  const byChannel = useMemo(()=>CHANNELS.map(ch=>({channel:ch,...sumFor(yearEntries,e=>e.channel===ch)})),[yearEntries]);
  const weeks8 = useMemo(()=>buildWeekIndex(year).slice(1,9).reverse(),[year]); // skip index0 (현재 진행중인 주), 완료된 주만
  const hasFxMissing = useMemo(()=>yearEntries.some(e=>e._fxMissing),[yearEntries]);

  const channelTraffic = useMemo(()=>CHANNELS.map(ch=>{
    const chVisitorRecs = yearVisitors.filter(v=>v.channel===ch);
    const pdfOrders = chVisitorRecs.reduce((s,v)=>s+(v.orders||0),0);
    const visitorSum = chVisitorRecs.reduce((s,v)=>s+v.visitors,0);
    const cvr = visitorSum>0 ? (pdfOrders/visitorSum*100) : null;
    return {channel:ch, orders:pdfOrders, visitors:visitorSum, cvr};
  }),[yearVisitors]);

  // 주별 방문자·주문·판매수량·GMV (전체 채널 합산)
  const weeklyGrowth = useMemo(()=>weeks8.map(w=>{
    const wEntries = entries.filter(e=>inRange(e.date,w.monday,w.sunday));
    const wVisitors = (visitors||[]).filter(v=>inRange(v.date,w.monday,w.sunday)).reduce((s,v)=>s+v.visitors,0);
    const orders = countOrders(wEntries);
    const qty = wEntries.reduce((s,e)=>s+e.qty,0);
    const gmv = wEntries.reduce((s,e)=>s+e.amount,0);
    return {label:w.label.replace(' ','').replace('주차','주'), visitors:wVisitors, orders, qty, gmv};
  }),[weeks8,entries,visitors]);

  function normalizeIdx(values){
    const base = values.find(v=>v>0);
    if(!base) return values.map(()=>0);
    return values.map(v=>v/base*100);
  }
  const growthSeries = [
    {name:'방문자', color:'#2f6b4f', values: normalizeIdx(weeklyGrowth.map(w=>w.visitors))},
    {name:'주문 건수', color:'#9a3b2f', values: normalizeIdx(weeklyGrowth.map(w=>w.orders))},
    {name:'판매 수량', color:'#c8742a', values: normalizeIdx(weeklyGrowth.map(w=>w.qty))},
    {name:'GMV', color:'#5b7fae', values: normalizeIdx(weeklyGrowth.map(w=>w.gmv))},
  ];

  // 이번 달 vs 전월 — 월별 집행결과 보고서와 동일한 전월대비 로직
  const monthCompare = useMemo(()=>{
    const today = new Date();
    // 진행 중인 이번 달 대신, 마지막으로 마감된 달을 기준으로 비교합니다 (한 달 전체가 끝나야 의미 있는 비교라서)
    const lastCompletedAnchor = new Date(today.getFullYear(), today.getMonth(), 0); // 이번 달 0일 = 전월 말일
    const curS = startOfMonth(lastCompletedAnchor), curE = endOfMonth(lastCompletedAnchor);
    const prevAnchor = new Date(curS); prevAnchor.setDate(0);
    const prevS = startOfMonth(prevAnchor), prevE = endOfMonth(prevAnchor);
    const curFrom = iso(curS), curTo = iso(curE), prevFrom = iso(prevS), prevTo = iso(prevE);
    const curEntries = entries.filter(e=>inRange(e.date,curFrom,curTo));
    const prevEntries = entries.filter(e=>inRange(e.date,prevFrom,prevTo));
    const safe = visitors||[];
    const curVisitors  = safe.filter(v=>inRange(v.date,curFrom,curTo)).reduce((s,v)=>s+v.visitors,0);
    const prevVisitors = safe.filter(v=>inRange(v.date,prevFrom,prevTo)).reduce((s,v)=>s+v.visitors,0);
    // 주문수: 방문자 시드에 플랫폼 주문수(orders)가 있으면 그걸 쓰고, 없으면 판매 입력 기반으로 집계
    const curPdfOrders  = safe.filter(v=>inRange(v.date,curFrom,curTo)).reduce((s,v)=>s+(v.orders||0),0);
    const prevPdfOrders = safe.filter(v=>inRange(v.date,prevFrom,prevTo)).reduce((s,v)=>s+(v.orders||0),0);
    const curOrders  = curPdfOrders  || countOrders(curEntries);
    const prevOrders = prevPdfOrders || countOrders(prevEntries);
    return {
      label: `${curS.getMonth()+1}월`,
      visitors: curVisitors, prevVisitors,
      orders: curOrders, prevOrders,
      qty: curEntries.reduce((s,e)=>s+e.qty,0),
      prevQty: prevEntries.reduce((s,e)=>s+e.qty,0),
      gmv: curEntries.reduce((s,e)=>s+e.amount,0),
      prevGmv: prevEntries.reduce((s,e)=>s+e.amount,0),
    };
  },[entries,visitors]);

  return (
    <div className="section">
      <div className="section-head">
        <div>
          <div className="eyebrow"><span className="live-dot"></span>실시간 현황판</div>
          <h2>{year}년 누적 현황</h2>
        </div>
      </div>
      <div className="live-badge-row">
        <span className="live-badge"><span className="live-dot"></span>실시간 반영 중 — 입력 즉시 자동 업데이트</span>
        {hasFxMissing && <span className="fx-warning">⚠ 일부 주간 환율 미설정 — 재고 확인에서 입력해주세요 (해당 금액 0으로 표시 중)</span>}
      </div>
      <div className="kpi-row five live-cards">
        <div className="kpi live-card"><div className="label">{year}년 누적 판매 수량</div><div className="value">{fmt(totals.qty)}개</div></div>
        <div className="kpi live-card"><div className="label">{year}년 누적 GMV(천원)</div><div className="value">{fmt(totals.amount)}</div></div>
        <div className="kpi live-card"><div className="label">{year}년 누적 방문자</div><div className="value">{fmt(yearVisitors.reduce((s,v)=>s+v.visitors,0))}명</div></div>
        <div className="kpi live-card"><div className="label">참여 업체 수</div><div className="value">{new Set(yearEntries.map(e=>e.company)).size} / {COMPANIES.length}</div></div>
        <div className="kpi live-card"><div className="label">누적 플랫폼 주문</div>
          <div className="value">{fmt(yearVisitors.reduce((s,v)=>s+(v.orders||0),0))}건</div>
          <div style={{fontSize:'9.5px',color:'var(--muted)',marginTop:2}}>GV마켓 플랫폼 전체 기준</div>
        </div>
      </div>

      <div className="glance-title" style={{marginTop:6}}>{monthCompare.label} 성장 (전월 대비)</div>
      <div className="kpi-row">
        <GrowthCard label="방문자" current={monthCompare.visitors} previous={monthCompare.prevVisitors} suffix="명"/>
        <GrowthCard label="플랫폼 주문 건수" current={monthCompare.orders} previous={monthCompare.prevOrders} suffix="건"/>
        <GrowthCard label="판매 수량" current={monthCompare.qty} previous={monthCompare.prevQty} suffix="개"/>
        <GrowthCard label="GMV(천원)" current={monthCompare.gmv} previous={monthCompare.prevGmv} suffix=""/>
      </div>

      <div className="card">
        <div className="glance-title">방문자 · 주문 · 판매수량 · GMV 성장 추이 (첫 주=100 기준 지수)</div>
        <MultiLineTrend series={growthSeries} points={weeklyGrowth}/>
        <div className="hint" style={{marginTop:8}}>금액이 아닌 활동량 기준이라, 단가가 낮아도 성장 흐름이 그대로 드러납니다.</div>
      </div>

      <div className="card">
        <div className="glance-title">2026년 누적 — 채널별 방문자 · 주문 · 전환율(CVR)</div>
        <div className="traffic-grid">
          {channelTraffic.map(c=>(
            <div className="traffic-cell" key={c.channel}>
              <div className="traffic-chan"><span className="dot" style={{background:CHAN_COLOR[c.channel]}}></span>{c.channel}</div>
              <div className="traffic-row"><span>방문자</span><b>{c.visitors>0?fmt(c.visitors):'-'}</b></div>
              <div className="traffic-row"><span>주문</span><b>{fmt(c.orders)}건</b></div>
              <div className="traffic-row"><span>CVR</span><b className={c.cvr!==null?'':'muted'}>{c.cvr!==null?c.cvr.toFixed(1)+'%':'-'}</b></div>
            </div>
          ))}
        </div>
        <div className="hint" style={{marginTop:10}}>플랫폼 방문자·주문 데이터는 <b>1~6월 전체</b>가 반영되어 있습니다 (1~5월 누계 + 6월 주차별). "방문자 자료 반영" 버튼을 누르면 최신 데이터가 적용됩니다.</div>
      </div>

      <div className="card">
        <div className="glance-title">2026년 누적 — 채널 구성 GMV 비중 &amp; 채널 밸런스</div>
        <div className="chart-grid-2">
          <DonutChart segments={byChannel.map(c=>({name:c.channel,amount:c.amount,color:CHAN_COLOR[c.channel]}))} centerLabel="누적 GMV(천원)" centerValue={totals.amount} unit="천원"/>
          <div style={{display:'flex',justifyContent:'center'}}>
            <RadarChart axes={byChannel.map(c=>({label:c.channel,value:c.amount}))} color="#9a3b2f"/>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------------- MONTHLY SECTION ----------------
function MonthlySection({entries, visitors, year}){
  const today = new Date();
  const lastCompletedMonth = new Date(today.getFullYear(), today.getMonth(), 0); // 이번 달 0일 = 전월 말일
  const [month,setMonth] = useState(lastCompletedMonth.getMonth()+1);

  const range = useMemo(()=>{
    const a = new Date(year, month-1, 1);
    const s = startOfMonth(a), en = endOfMonth(a);
    const prevA = new Date(year, month-2, 1);
    const ps = startOfMonth(prevA), pe = endOfMonth(prevA);
    return {from:iso(s), to:iso(en), prevFrom:iso(ps), prevTo:iso(pe), label:`${year}년 ${month}월`};
  },[year,month]);

  const data = useMemo(()=>buildReport(entries, range.from, range.to, range.prevFrom, range.prevTo),[entries,range]);
  const visitorSum = useMemo(()=>(visitors||[]).filter(v=>inRange(v.date,range.from,range.to)).reduce((s,v)=>s+v.visitors,0),[visitors,range]);

  function copyTSV(){
    const lines = [['업체명','판매채널','총판매 수량','총판매 GMV(천원)',`${range.label} 수량`,`${range.label} GMV(천원)`,'전월대비 수량%','전월대비 GMV%'].join('\t')];
    function row(name,ch,cum,cur,prev){
      return [name,ch,cum.qty,cum.amount,cur.qty,cur.amount,fmtPct(pctChange(cur.qty,prev.qty)),fmtPct(pctChange(cur.amount,prev.amount))].join('\t');
    }
    lines.push(row('총합계','',data.grandCum,data.grandCur,data.grandPrev));
    data.grandByChannel.forEach(c=>lines.push(row('',c.channel,c.cum,c.cur,c.prev)));
    data.rows.forEach(r=>{
      lines.push(row(r.company,'소계',r.cumSub,r.curSub,r.prevSub));
      r.channels.forEach(c=>lines.push(row('',c.channel,c.cum,c.cur,c.prev)));
    });
    navigator.clipboard.writeText(lines.join('\n')).catch(()=>{});
  }

  return (
    <div className="section">
      <div className="section-head">
        <div>
          <div className="eyebrow">월 현황판</div>
          <h2>{range.label}</h2>
        </div>
        <div className="toolbar no-print">
          <select value={month} onChange={e=>setMonth(Number(e.target.value))}>
            {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}월</option>)}
          </select>
        </div>
      </div>

      <div className="card">
        <div className="kpi-row five">
          <div className="kpi"><div className="label">{range.label} 판매 수량</div><div className="value">{fmt(data.grandCur.qty)}개</div>
            <div className={"delta "+(pctChange(data.grandCur.qty,data.grandPrev.qty)>=0?'up':'down')}>{fmtPct(pctChange(data.grandCur.qty,data.grandPrev.qty))} 전월대비</div></div>
          <div className="kpi"><div className="label">{range.label} GMV(천원)</div><div className="value">{fmt(data.grandCur.amount)}</div>
            <div className={"delta "+(pctChange(data.grandCur.amount,data.grandPrev.amount)>=0?'up':'down')}>{fmtPct(pctChange(data.grandCur.amount,data.grandPrev.amount))} 전월대비</div></div>
          <div className="kpi"><div className="label">{range.label} 방문자</div><div className="value">{fmt(visitorSum)}명</div></div>
          <div className="kpi"><div className="label">누적 판매 수량</div><div className="value">{fmt(data.grandCum.qty)}개</div></div>
          <div className="kpi"><div className="label">누적 GMV(천원)</div><div className="value">{fmt(data.grandCum.amount)}</div></div>
        </div>

        <div className="glance-grid">
          <div>
            <div className="glance-title">채널별 GMV 비중</div>
            <DonutChart segments={data.grandByChannel.map(c=>({name:c.channel, amount:c.cur.amount, color:CHAN_COLOR[c.channel]}))} centerLabel={`${range.label} GMV`} centerValue={data.grandCur.amount} size={130}/>
          </div>
          <div>
            <div className="glance-title">업체별 GMV 순위</div>
            {data.rows.every(r=>r.curSub.amount===0) ? <div className="quiet-empty">입력 대기 중</div> : (
              <RankBars items={
                data.rows.filter(r=>r.curSub.amount>0).sort((a,b)=>b.curSub.amount-a.curSub.amount).slice(0,6)
                  .map(r=>({name:r.company, amount:r.curSub.amount, qty:r.curSub.qty, color:'var(--accent)'}))
              }/>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------------- WEEKLY SECTION ----------------
function WeeklySection({entries, visitors, year}){
  const weeks = useMemo(()=>buildWeekIndex(year),[year]);
  const current = weeks[1] || weeks[0]; // 진행 중인 현재 주(weeks[0])는 건너뛰고 마감된 최신 주를 사용

  const range = useMemo(()=>{
    if(!current) return {from:todayISO(),to:todayISO(),prevFrom:todayISO(),prevTo:todayISO(),label:''};
    const s = new Date(current.monday+'T00:00:00');
    const en = addDays(s,6);
    const prevS = addDays(s,-7), prevE = addDays(s,-1);
    return {from:current.monday, to:current.sunday, prevFrom:iso(prevS), prevTo:iso(prevE), label:`${current.label} (${shortDate(current.monday)}~${shortDate(current.sunday)})`};
  },[current]);

  const data = useMemo(()=>buildReport(entries, range.from, range.to, range.prevFrom, range.prevTo),[entries,range]);
  const visitorSum = useMemo(()=>(visitors||[]).filter(v=>inRange(v.date,range.from,range.to)).reduce((s,v)=>s+v.visitors,0),[visitors,range]);

  if(!current) return null;

  return (
    <div className="section">
      <div className="section-head">
        <div>
          <div className="eyebrow">주 현황판 · 마감된 최신 주</div>
          <h2>{range.label}</h2>
        </div>
      </div>

      <div className="card">
        <div className="kpi-row five">
          <div className="kpi"><div className="label">해당 주 판매 수량</div><div className="value">{fmt(data.grandCur.qty)}개</div></div>
          <div className="kpi"><div className="label">해당 주 GMV(천원)</div><div className="value">{fmt(data.grandCur.amount)}</div></div>
          <div className="kpi"><div className="label">해당 주 방문자</div><div className="value">{fmt(visitorSum)}명</div></div>
          <div className="kpi"><div className="label">누적 판매 수량</div><div className="value">{fmt(data.grandCum.qty)}개</div></div>
          <div className="kpi"><div className="label">누적 GMV(천원)</div><div className="value">{fmt(data.grandCum.amount)}</div></div>
        </div>

        <div className="glance-grid">
          <div>
            <div className="glance-title">채널별 GMV 비중</div>
            <DonutChart segments={data.grandByChannel.map(c=>({name:c.channel, amount:c.cur.amount, color:CHAN_COLOR[c.channel]}))} centerLabel="해당 주 GMV" centerValue={data.grandCur.amount} size={130}/>
          </div>
          <div>
            <div className="glance-title">업체별 GMV 순위</div>
            {data.rows.every(r=>r.curSub.amount===0) ? <div className="quiet-empty">입력 대기 중</div> : (
              <RankBars items={
                data.rows.filter(r=>r.curSub.amount>0).sort((a,b)=>b.curSub.amount-a.curSub.amount).slice(0,6)
                  .map(r=>({name:r.company, amount:r.curSub.amount, qty:r.curSub.qty, color:'var(--accent)'}))
              }/>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// 장부는 삭제 없이 정정·반품 행 추가만 — 원본 거래 보존
function CorrectionPanel({entries, persist}){
  const [show,setShow] = useState(false);
  const [type,setType] = useState('correction'); // correction | refund
  const [refEntry,setRefEntry] = useState(''); // 참조할 원본 거래 ID
  const [form,setForm] = useState({date:todayISO(), company:COMPANIES[0], sku:productsFor(COMPANIES[0])[0].code, channel:CHANNELS[0], qty:'', amount:'', note:''});
  const [saving,setSaving] = useState(false);
  const [err,setErr] = useState(null);
  const [msg,setMsg] = useState(null);

  // 참조 가능한 원본 거래 목록 (정정/반품 제외)
  const refOptions = useMemo(()=>
    [...(entries||[])].filter(e=>!e.correctionOf && !e.refundOf && !String(e.id).startsWith('seed-'))
      .sort((a,b)=>b.date.localeCompare(a.date)||( b.id>a.id?1:-1)).slice(0,60)
  ,[entries]);

  function fillFromRef(id){
    setRefEntry(id);
    if(!id){ return; }
    const orig = (entries||[]).find(e=>e.id===id);
    if(!orig) return;
    setForm(f=>({...f, date:todayISO(), company:orig.company, sku:orig.sku, channel:orig.channel,
      qty:type==='refund'?String(orig.qty):'', amount:type==='refund'?String(orig.amount):'', note:''}));
  }

  async function handleSubmit(e){
    e.preventDefault();
    const qtyN = Number(form.qty)||0, amtN = Number(form.amount)||0;
    if(!qtyN && !amtN){ setErr('수량 또는 금액을 입력해주세요.'); return; }
    setSaving(true); setErr(null);
    const skuObj = productsFor(form.company).find(p=>p.code===form.sku);
    const typeLabel = type==='refund'?'반품':'정정';
    const entry = {
      id: Date.now()+'-'+Math.random().toString(36).slice(2,7),
      date: form.date, company: form.company, channel: form.channel,
      sku: form.sku, skuName: (skuObj?skuObj.name:form.sku)+` [${typeLabel}]`,
      qty: -Math.abs(qtyN),    // 항상 마이너스로 기록 (원본 취소/차감)
      amount: -Math.abs(amtN),
      note: form.note || (type==='refund'?'반품 처리':'입력 정정'),
      ...(type==='correction' ? {correctionOf: refEntry||null} : {refundOf: refEntry||null}),
    };
    await persist([...(entries||[]), entry]);
    setMsg({type:'ok', text:`${typeLabel} 처리가 기록됐습니다.`});
    setForm(f=>({...f, qty:'', amount:'', note:''}));
    setRefEntry('');
    setSaving(false);
    setTimeout(()=>setMsg(null),4000);
  }

  return (
    <div style={{marginTop:16}}>
      <button type="button" className="toggle-section" onClick={()=>setShow(v=>!v)}>
        {show ? '− 정정 / 반품 입력 닫기' : '+ 정정 / 반품 입력'}
      </button>
      {show && (
        <div className="bundle-panel">
          <div className="hint" style={{marginBottom:10}}>
            거래는 <b>삭제하지 않습니다.</b> 잘못 입력한 거래는 "정정", 반품은 "반품"으로 마이너스(-) 행을 추가해 장부를 맞춥니다.
            원본 거래는 그대로 남고, 합산 시 자동으로 상쇄됩니다.
          </div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <button type="button" className={"week-chip "+(type==='correction'?'active':'')} onClick={()=>setType('correction')}>입력 정정</button>
            <button type="button" className={"week-chip "+(type==='refund'?'active':'')} onClick={()=>setType('refund')}>반품 처리</button>
          </div>
          <form onSubmit={handleSubmit}>
            <div className="field"><label>원본 거래 선택 (선택)</label>
              <select value={refEntry} onChange={e=>fillFromRef(e.target.value)}>
                <option value="">— 원본 거래를 선택하면 자동 채워짐</option>
                {refOptions.map(e=>(
                  <option key={e.id} value={e.id}>{e.date} · {e.company} · {e.skuName||e.sku} · {e.channel} · {fmt(e.qty)}개 · {fmt(e.amount)}천동</option>
                ))}
              </select>
            </div>
            <div className="field"><label>날짜</label>
              <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} required/></div>
            <div className="field"><label>업체명</label>
              <select value={form.company} onChange={e=>{
                const opts=productsFor(e.target.value);
                setForm(f=>({...f,company:e.target.value,sku:opts[0].code}));
              }}>
                {COMPANIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select></div>
            <div className="field"><label>제품(SKU)</label>
              <select value={form.sku} onChange={e=>setForm(f=>({...f,sku:e.target.value}))}>
                {productsFor(form.company).map(p=><option key={p.code} value={p.code}>{p.name}</option>)}
              </select></div>
            <div className="field"><label>채널</label>
              <select value={form.channel} onChange={e=>setForm(f=>({...f,channel:e.target.value}))}>
                {CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}
              </select></div>
            <div className="field"><label>취소 수량</label>
              <input type="number" min="0" placeholder="0" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/></div>
            <div className="field"><label>취소 금액 (천동)</label>
              <input type="number" min="0" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
            <div className="field"><label>사유 메모</label>
              <input type="text" placeholder={type==='refund'?'예: 파손 반품, 고객 취소':'예: 수량 오입력 정정'} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
            <button type="submit" className="submit-btn" disabled={saving} style={{background:'var(--accent)'}}>
              {saving?'처리 중...':`${type==='refund'?'반품':'정정'} 기록 추가`}
            </button>
          </form>
          {err && <div className="hint" style={{color:'var(--bad)',marginTop:8}}>{err}</div>}
          {msg && <div className="hint" style={{color:'var(--good)',marginTop:8}}>{msg.text}</div>}
        </div>
      )}
    </div>
  );
}


function LogTab({entries, fxRates}){
  const [company,setCompany] = useState('all');
  const [channel,setChannel] = useState('all');
  const [dateFrom,setDateFrom] = useState('');
  const [dateTo,setDateTo] = useState('');
  const [search,setSearch] = useState('');
  const [showAdj,setShowAdj] = useState(true);
  const [copyMsg,setCopyMsg] = useState(null);

  const rows = useMemo(()=>{
    return entries
      .filter(e=>company==='all' || e.company===company)
      .filter(e=>channel==='all' || e.channel===channel)
      .filter(e=>!dateFrom || e.date>=dateFrom)
      .filter(e=>!dateTo || e.date<=dateTo)
      .filter(e=>showAdj ? true : (!e.correctionOf && !e.refundOf))
      .filter(e=>{
        if(!search.trim()) return true;
        const q = search.trim().toLowerCase();
        return (e.company||'').toLowerCase().includes(q)||(e.skuName||'').toLowerCase().includes(q)||(e.orderId||'').toLowerCase().includes(q)||(e.note||'').toLowerCase().includes(q);
      })
      .map(e=>({...e, krwAmount: toKRWAmount(e, fxRates)}))
      .sort((a,b)=> b.date.localeCompare(a.date)||(b.id>a.id?1:-1));
  },[entries,company,channel,dateFrom,dateTo,search,showAdj,fxRates]);

  const totalQty = rows.reduce((s,r)=>s+r.qty,0);
  const totalKrw = rows.reduce((s,r)=>s+(r.krwAmount||0),0);
  const adjCount = rows.filter(r=>r.correctionOf||r.refundOf).length;
  function rowType(r){ return r.refundOf?'refund':r.correctionOf?'correction':null; }

  function downloadCSV(){
    const head = ['날짜','유형','업체','제품(SKU)','채널','수량','입력금액(천동)','환산GMV(천원)','메모'];
    const lines = [head.join(',')];
    rows.forEach(r=>{
      const t=rowType(r);
      lines.push([r.date,t?({refund:'반품',correction:'정정'}[t]):'판매',r.company,`"${r.skuName||r.sku||''}"`,r.channel,r.qty,r.alreadyKRW?'':r.amount,r.krwAmount!==null?Math.round(r.krwAmount):'미환산',`"${r.note||''}"`].join(','));
    });
    const csv='\uFEFF'+lines.join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`거래로그_${todayISO()}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function copyTSV(){
    const head=['날짜','유형','업체','제품(SKU)','채널','수량','환산GMV(천원)','메모'];
    const lines=[head.join('\t')];
    rows.forEach(r=>{
      const t=rowType(r);
      lines.push([r.date,t?({refund:'반품',correction:'정정'}[t]):'판매',r.company,r.skuName||r.sku||'',r.channel,r.qty,r.krwAmount!==null?Math.round(r.krwAmount):'미환산',r.note||''].join('\t'));
    });
    navigator.clipboard.writeText(lines.join('\n'))
      .then(()=>{setCopyMsg({type:'ok',text:'복사되었습니다.'}); setTimeout(()=>setCopyMsg(null),3000);})
      .catch(()=>{setCopyMsg({type:'err',text:'복사 실패.'});});
  }

  return (
    <div className="section">
      <div className="section-head"><div><div className="eyebrow">거래 로그</div><h2>전체 거래 내역 (장부)</h2></div></div>
      <div className="card">
        <div className="toolbar no-print" style={{marginBottom:14,flexWrap:'wrap'}}>
          <select value={company} onChange={e=>setCompany(e.target.value)}>
            <option value="all">전체 업체</option>
            {COMPANIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select value={channel} onChange={e=>setChannel(e.target.value)}>
            <option value="all">전체 채널</option>
            {CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          <span style={{fontSize:'12px',color:'var(--muted)'}}>~</span>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
          <input type="text" placeholder="업체·제품·사유 검색" value={search} onChange={e=>setSearch(e.target.value)} style={{border:'1px solid var(--line)',borderRadius:6,padding:'7px 9px',fontSize:'12.5px',fontFamily:'inherit',minWidth:180}}/>
          <label style={{display:'flex',alignItems:'center',gap:6,fontSize:'12px',cursor:'pointer'}}>
            <input type="checkbox" checked={showAdj} onChange={e=>setShowAdj(e.target.checked)}/> 정정·반품 포함
          </label>
          <button className="copy-btn" onClick={copyTSV}>표 복사</button>
          <button className="copy-btn" onClick={downloadCSV}>CSV 다운로드</button>
          {copyMsg && <span style={{fontSize:'11px',color:copyMsg.type==='err'?'var(--bad)':'var(--good)'}}>{copyMsg.text}</span>}
        </div>
        <div className="mini-kpi-row" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:14}}>
          <div className="mini-kpi"><div className="mk-label">조회된 거래</div><div className="mk-value">{rows.length}건</div></div>
          <div className="mini-kpi"><div className="mk-label">합계 수량 (정정 반영)</div><div className="mk-value">{fmt(totalQty)}개</div></div>
          <div className="mini-kpi"><div className="mk-label">합계 GMV (정정 반영)</div><div className="mk-value">{fmt(totalKrw)}</div></div>
          <div className="mini-kpi"><div className="mk-label">정정·반품 건수</div><div className="mk-value">{adjCount}건</div></div>
        </div>
        {rows.length===0 ? <div className="empty">조건에 맞는 거래가 없습니다.</div> : (
        <div style={{overflowX:'auto'}}>
        <table className="entries">
          <thead><tr><th>날짜</th><th>유형</th><th>업체</th><th>제품</th><th>채널</th><th>수량</th><th>GMV(천원)</th><th>메모</th></tr></thead>
          <tbody>

              return (
                <tr key={r.id} style={t?{background:'#fff8f0'}:{}}>

                  <td>{t==='refund'&&<span style={{background:'#fde',color:'#c00',borderRadius:4,padding:'1px 6px',fontSize:'10px',fontWeight:700}}>반품</span>}{t==='correction'&&<span style={{background:'#fff0d0',color:'#a06000',borderRadius:4,padding:'1px 6px',fontSize:'10px',fontWeight:700}}>정정</span>}{!t&&<span style={{color:'var(--muted)',fontSize:'11px'}}>판매</span>}</td>

                  <td style={r.qty<0?{color:'#c00',fontWeight:700}:{}}>{r.qty>0?'+':''}{fmt(r.qty)}</td>
                  <td style={r.krwAmount!==null&&r.krwAmount<0?{color:'#c00',fontWeight:700}:{}}>{r.krwAmount!==null?fmt(r.krwAmount):<span style={{color:'var(--accent)'}}>환율 미설정</span>}</td>
                  <td style={{color:'var(--muted)',fontSize:'10.5px'}}>{r.note||'—'}</td>

        )}

    </div>

}

function ReportTab({entries, visitors, fixedPeriodType}){
  const [periodType,setPeriodType] = useState(fixedPeriodType || 'week');
  const [anchor,setAnchor] = useState(todayISO());
  const weeks = useMemo(()=>periodType==='week' ? buildWeekIndex(new Date().getFullYear()) : [],[periodType]);

  const range = useMemo(()=>{
    const a = new Date(anchor+'T00:00:00');
    if(periodType==='week'){
      const s = startOfWeekMon(a); const en = addDays(s,6);
      const prevS = addDays(s,-7); const prevE = addDays(s,-1);
      return {from:iso(s), to:iso(en), prevFrom:iso(prevS), prevTo:iso(prevE), label:`${iso(s)} ~ ${iso(en)}`};
    } else {
      const s = startOfMonth(a); const en = endOfMonth(a);
      const prevAnchor = new Date(s); prevAnchor.setDate(0);
      const ps = startOfMonth(prevAnchor); const pe = endOfMonth(prevAnchor);
      return {from:iso(s), to:iso(en), prevFrom:iso(ps), prevTo:iso(pe), label:`${s.getFullYear()}.${s.getMonth()+1}월`};
    }
  },[periodType,anchor]);

  const data = useMemo(()=>buildReport(entries, range.from, range.to, range.prevFrom, range.prevTo),[entries,range]);
  const isMonth = periodType==='month';

  const visitorStats = useMemo(()=>{
    const safe = visitors||[];
    const cur = safe.filter(v=>inRange(v.date, range.from, range.to)).reduce((s,v)=>s+v.visitors,0);
    const cum = safe.filter(v=>v.date<=range.to).reduce((s,v)=>s+v.visitors,0);
    const prev = safe.filter(v=>inRange(v.date, range.prevFrom, range.prevTo)).reduce((s,v)=>s+v.visitors,0);
    return {cur, cum, prev};
  },[visitors, range]);

  const [copyMsg,setCopyMsg] = useState(null);
  function copyTSV(){
    const head = ['업체명','판매채널','총판매 수량','총판매 GMV(천원)',`${range.label} 수량`,`${range.label} GMV(천원)`];
    const lines = [head.join('\t')];
    function row(name,ch,cum,cur){
      return [name,ch,cum.qty,cum.amount,cur.qty,cur.amount].join('\t');
    }
    lines.push(row('총합계','',data.grandCum,data.grandCur));
    lines.push([`${range.label} 방문자`,'','','',visitorStats.cur,''].join('\t'));
    lines.push(['누적 방문자','','','',visitorStats.cum,''].join('\t'));
    if(isMonth){
      lines.push(['전월대비','',data.grandCur.qty>0?`+${data.grandCur.qty}개`:'-',data.grandCur.amount>0?`+${data.grandCur.amount}`:'-',fmtPct(pctChange(data.grandCur.qty,data.grandPrev.qty)),fmtPct(pctChange(data.grandCur.amount,data.grandPrev.amount))].join('\t'));
    }
    data.grandByChannel.forEach(c=>lines.push(row('',c.channel,c.cum,c.cur)));
    data.rows.forEach(r=>{
      lines.push(row(r.company,'소계',r.cumSub,r.curSub));
      r.channels.forEach(c=>lines.push(row('',c.channel,c.cum,c.cur)));
    });
    navigator.clipboard.writeText(lines.join('\n'))
      .then(()=>{ setCopyMsg({type:'ok',text:'복사되었습니다.'}); setTimeout(()=>setCopyMsg(null),3000); })
      .catch(()=>{ setCopyMsg({type:'err',text:'복사 실패. 브라우저 권한을 확인하세요.'}); });
  }

  return (
    <div>
      <div className="toolbar no-print" style={{marginBottom:16}}>
        {!fixedPeriodType && (
          <div className="seg">
            <button className={periodType==='week'?'active':''} onClick={()=>setPeriodType('week')}>주간</button>
            <button className={periodType==='month'?'active':''} onClick={()=>setPeriodType('month')}>월간</button>
          </div>
        )}
        {periodType==='month' && (
          <input type="month" value={anchor.slice(0,7)} onChange={e=>setAnchor(e.target.value+'-01')}/>
        )}
        {periodType==='week' && (
          <input type="date" value={anchor} onChange={e=>setAnchor(e.target.value)}/>
        )}
        <span style={{fontSize:'12.5px',color:'var(--muted)'}}>기준 기간: {range.label}</span>
      </div>

      {periodType==='week' && (
        <div className="week-strip no-print">
          {(() => {
            const juneOn = weeks.filter(w=>w.monday>='2026-06-01').slice().reverse();
            const lastMayWeek = weeks.find(w=>w.monday<'2026-06-01'); // weeks is newest-first
            const mayActive = lastMayWeek && range.from < '2026-06-01';
            return (
              <React.Fragment>
                {lastMayWeek && (
                  <button className={"week-chip "+(mayActive?'active':'')}
                    onClick={()=>setAnchor(lastMayWeek.monday)}>~5월</button>
                )}
                {juneOn.map(w=>(
                  <button key={w.monday} className={"week-chip "+(w.monday===range.from?'active':'')}
                    onClick={()=>setAnchor(w.monday)}>{w.label}</button>
                ))}
              </React.Fragment>
            );
          })()}
        </div>
      )}

      <div className="page">
        <div className="page-head">
          <div>
            <div className="page-eyebrow">경상북도 · GV마켓 {isMonth?'월간':'주간'}보고</div>
            <div className="page-title">{range.label} 집행결과 보고</div>
          </div>
          <div className="page-actions no-print">
            <button className="copy-btn" onClick={copyTSV}>표 복사</button>
            <button className="copy-btn" onClick={()=>window.print()}>인쇄 / PDF 저장</button>
            {copyMsg && <span style={{fontSize:'11px',color: copyMsg.type==='err'?'var(--bad)':'var(--good)', alignSelf:'center'}}>{copyMsg.text}</span>}
          </div>
        </div>

        <div className="mini-kpi-row five">
          <div className="mini-kpi"><div className="mk-label">{range.label} 판매 수량</div><div className="mk-value">{fmt(data.grandCur.qty)}개</div></div>
          <div className="mini-kpi"><div className="mk-label">{range.label} GMV(천원)</div><div className="mk-value">{fmt(data.grandCur.amount)}</div></div>
          <div className="mini-kpi"><div className="mk-label">{range.label} 방문자</div><div className="mk-value">{fmt(visitorStats.cur)}명</div>
            {isMonth && <div className={"mk-delta "+(visitorStats.cur>=visitorStats.prev?'up':'down')}>{visitorStats.cur>=visitorStats.prev?'+':''}{fmt(visitorStats.cur-visitorStats.prev)}명 전월대비</div>}
          </div>
          <div className="mini-kpi"><div className="mk-label">누적 판매 수량</div><div className="mk-value">{fmt(data.grandCum.qty)}개</div></div>
          <div className="mini-kpi"><div className="mk-label">누적 GMV(천원)</div><div className="mk-value">{fmt(data.grandCum.amount)}</div></div>
          <div className="mini-kpi"><div className="mk-label">누적 방문자</div><div className="mk-value">{fmt(visitorStats.cum)}명</div></div>
        </div>

        <div style={{marginBottom:16}}>
          <DonutChart segments={data.grandByChannel.map(c=>({name:c.channel, amount:c.cur.amount, color:CHAN_COLOR[c.channel]}))} centerLabel={`${range.label} GMV`} centerValue={data.grandCur.amount} size={108}/>
        </div>

        <table className="report compact">
          <thead>
            <tr>
              <th rowSpan="2" style={{textAlign:'left'}}>업체명</th>
              <th rowSpan="2">판매채널</th>
              <th colSpan="2">총판매</th>
              <th colSpan="2">{range.label} 판매</th>
            </tr>
            <tr>
              <th>수량</th><th>GMV</th><th>수량</th><th>GMV</th>
            </tr>
          </thead>
          <tbody>
            <tr className="grand">
              <td className="company-cell" colSpan="2">총합계</td>
              <td>{fmt(data.grandCum.qty)}</td><td>{fmt(data.grandCum.amount)}</td>
              <td>{fmt(data.grandCur.qty)}</td><td>{fmt(data.grandCur.amount)}</td>
            </tr>
            {isMonth && (
              <tr className="growth-row">
                <td className="lbl" colSpan="2">전월대비</td>
                <td className="delta-up">{data.grandCur.qty>0?`+${fmt(data.grandCur.qty)}개`:'-'}</td>
                <td className="delta-up">{data.grandCur.amount>0?`+${fmt(data.grandCur.amount)}`:'-'}</td>
                <td className={pctChange(data.grandCur.qty,data.grandPrev.qty)>=0?'delta-up':'delta-down'}>{fmtPct(pctChange(data.grandCur.qty,data.grandPrev.qty))}</td>
                <td className={pctChange(data.grandCur.amount,data.grandPrev.amount)>=0?'delta-up':'delta-down'}>{fmtPct(pctChange(data.grandCur.amount,data.grandPrev.amount))}</td>
              </tr>
            )}
            {data.grandByChannel.map(c=>(
              <tr key={c.channel}>
                <td className="lbl"></td><td className="lbl">{c.channel}</td>
                <td>{fmt(c.cum.qty)}</td><td>{fmt(c.cum.amount)}</td>
                <td>{fmt(c.cur.qty)}</td><td>{fmt(c.cur.amount)}</td>
              </tr>
            ))}
            {data.rows.map(r=>(
              <React.Fragment key={r.company}>
                <tr className="subtotal">
                  <td className="company-cell">{r.company}</td><td className="lbl">소계</td>
                  <td>{fmt(r.cumSub.qty)}</td><td>{fmt(r.cumSub.amount)}</td>
                  <td>{fmt(r.curSub.qty)}</td><td>{fmt(r.curSub.amount)}</td>
                </tr>
                {r.channels.map(c=>(
                  <tr key={r.company+c.channel}>
                    <td className="lbl"></td><td className="lbl">{c.channel}</td>
                    <td>{fmt(c.cum.qty)}</td><td>{fmt(c.cum.amount)}</td>
                    <td>{fmt(c.cur.qty)}</td><td>{fmt(c.cur.amount)}</td>
                  </tr>
                ))}
              </React.Fragment>
            ))}
          </tbody>
        </table>
        <div className="page-foot no-print">{isMonth?'전월대비 증감률이 포함되어 있습니다.':'주간보고는 전월대비가 없습니다 — 월간보고에서 확인하세요.'} "인쇄 / PDF 저장"으로 1페이지 보고서를 바로 출력할 수 있습니다.</div>
      </div>
    </div>
  );
}

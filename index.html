function InventoryDrawer({entries, stockIn, prices, persistPrices, fxRates, persistFxRates, onClose}){
  const today = new Date();
  const [month,setMonth] = useState(today.getMonth()+1);
  const [year] = useState(today.getFullYear());
  const [priceText,setPriceText] = useState('');
  const [priceMsg,setPriceMsg] = useState(null);
  const fileInputRef = useRef(null);
  const [fxEdits,setFxEdits] = useState({});
  const fxWeeks = useMemo(()=>buildWeekIndex(today.getFullYear()).slice(0,12),[]); // 최근 12주

  const monthFrom = `${year}-${pad2(month)}-01`;
  const monthTo = iso(endOfMonth(new Date(year,month-1,1)));

  const rows = useMemo(()=>{
    const out = [];
    COMPANIES.forEach(company=>{
      productsFor(company).forEach(p=>{
        const inAll = stockIn.filter(s=>s.company===company && s.sku===p.code).reduce((sum,s)=>sum+s.qty,0);
        const outAll = entries.filter(e=>e.company===company && e.sku===p.code).reduce((sum,e)=>sum+e.qty,0);
        const inMonth = stockIn.filter(s=>s.company===company && s.sku===p.code && inRange(s.date,monthFrom,monthTo)).reduce((sum,s)=>sum+s.qty,0);
        const outMonth = entries.filter(e=>e.company===company && e.sku===p.code && inRange(e.date,monthFrom,monthTo)).reduce((sum,e)=>sum+e.qty,0);
        if(inAll===0 && outAll===0) return; // skip untouched SKUs to keep the view short
        out.push({company, sku:p.code, name:p.name, inAll, outAll, remain:inAll-outAll, inMonth, outMonth});
      });
    });
    return out;
  },[entries,stockIn,monthFrom,monthTo]);

  function downloadCSV(){
    const head = ['업체','제품(SKU)','입고 누계','판매 누계','현재고','이번달 입고','이번달 판매'];
    const lines = [head.join(',')];
    rows.forEach(r=>{
      lines.push([r.company, `"${r.name}"`, r.inAll, r.outAll, r.remain, r.inMonth, r.outMonth].join(','));
    });
    const csv = '\uFEFF'+lines.join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `재고확인_${year}-${pad2(month)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function parsePriceCSV(text){
    const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const next = {...prices};
    let updated = 0, skipped = 0;
    lines.forEach(line=>{
      const parts = (line.includes('\t') ? line.split('\t') : line.split(',')).map(p=>p.trim());
      const [company, sku, gvOnline, shopee, tiktok] = parts;
      if(!COMPANIES.includes(company)){ skipped++; return; }
      const skuObj = productsFor(company).find(p=>p.code===sku);
      if(!skuObj){ skipped++; return; }
      const vals = {"GV 온라인":gvOnline, "Shopee":shopee, "Tik Tok":tiktok};
      let any = false;
      PRICED_CHANNELS.forEach(ch=>{
        const v = vals[ch];
        if(v!==undefined && v!=='' && !isNaN(Number(v))){
          next[priceKey(company, sku, ch)] = Number(v);
          any = true;
        }
      });
      if(any) updated++; else skipped++;
    });
    return {next, updated, skipped};
  }

  function handlePriceImport(){
    if(!priceText.trim()){ setPriceMsg({type:'err',text:'붙여넣을 내용이 없습니다.'}); return; }
    const {next, updated, skipped} = parsePriceCSV(priceText);
    if(updated===0){ setPriceMsg({type:'err',text:'반영된 줄이 없습니다. 업체명·제품코드 표기를 확인해주세요.'}); return; }
    persistPrices(next);
    setPriceText('');
    setPriceMsg({type:'ok',text:`${updated}개 SKU 단가가 반영됐습니다${skipped>0?` (인식 안 된 ${skipped}줄 건너뜀)`:''}`});
  }

  function handleFileUpload(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const text = String(ev.target.result);
      const {next, updated, skipped} = parsePriceCSV(text);
      if(updated>0){
        persistPrices(next);
        setPriceMsg({type:'ok',text:`파일에서 ${updated}개 SKU 단가가 반영됐습니다${skipped>0?` (인식 안 된 ${skipped}줄 건너뜀)`:''}`});
      } else {
        setPriceMsg({type:'err',text:'파일에서 반영된 줄이 없습니다. 형식을 확인해주세요.'});
      }
    };
    reader.readAsText(file, 'UTF-8');
    e.target.value = '';
  }

  const priceRows = useMemo(()=>{
    const out = [];
    COMPANIES.forEach(company=>{
      productsFor(company).forEach(p=>{
        const gv = getPrice(prices, company, p.code, "GV 온라인");
        const sp = getPrice(prices, company, p.code, "Shopee");
        const tt = getPrice(prices, company, p.code, "Tik Tok");
        if(gv===null && sp===null && tt===null) return;
        out.push({company, sku:p.code, name:p.name, gv, sp, tt});
      });
    });
    return out;
  },[prices]);

  return (
    <div className="drawer no-print" style={{width:880}}>
      <button className="close-btn" onClick={onClose}>✕</button>
      <h3>재고 확인</h3>
      <div className="hint" style={{marginBottom:14}}>현재고 = 입고 누계 − 판매 누계 (자동 계산, 직원 입력 기준). 실물 재고와 다르면 입고/판매 입력을 점검해주세요.</div>

      <div className="inv-split">
        <div className="inv-price-panel">
          <div className="glance-title">① 채널별 SKU 단가 가져오기 (천원)</div>
          <div className="hint" style={{marginBottom:10}}>엑셀에서 단가표를 작성해 붙여넣거나 파일을 업로드하세요. 한 줄 형식: <b>업체명, 제품코드(SKU), GV온라인 단가, Shopee 단가, TikTok 단가</b> (콤마 또는 탭 구분, 빈 칸은 비워두면 됩니다). <b>B2B는 행사·지인판매·샘플로 가격이 매번 달라 여기서 다루지 않고, 주문 입력 시 직접 적습니다.</b></div>
          <textarea className="bulk-textarea" rows="5" placeholder={"DU 코스메틱,JOA-17,49,45,47\n미진 화장품,MUIRI-HYAL,39,35,"}
            value={priceText} onChange={e=>setPriceText(e.target.value)}></textarea>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button type="button" className="submit-btn" style={{flex:1}} onClick={handlePriceImport}>붙여넣은 내용 반영</button>
            <button type="button" className="copy-btn" onClick={()=>fileInputRef.current && fileInputRef.current.click()}>CSV 파일 업로드</button>
            <input type="file" accept=".csv,.txt" ref={fileInputRef} style={{display:'none'}} onChange={handleFileUpload}/>
          </div>
          {priceMsg && <div className="hint" style={{color: priceMsg.type==='err'?'var(--bad)':'var(--good)', marginTop:6}}>{priceMsg.text}</div>}

          <div className="glance-title" style={{marginTop:18}}>현재 등록된 단가</div>
          {priceRows.length===0 ? <div className="quiet-empty">아직 등록된 단가가 없습니다.</div> : (
          <table className="entries price-table">
            <thead><tr><th>제품(SKU)</th><th>GV온라인</th><th>Shopee</th><th>TikTok</th></tr></thead>
            <tbody>
              {priceRows.map(r=>(
                <tr key={r.company+r.sku}>
                  <td style={{fontSize:'10.5px'}}>{r.name}<div style={{color:'var(--muted)',fontSize:'9.5px'}}>{r.company}</div></td>
                  <td>{r.gv!==null?fmt(r.gv):'—'}</td>
                  <td>{r.sp!==null?fmt(r.sp):'—'}</td>
                  <td>{r.tt!==null?fmt(r.tt):'—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
          )}

          <div className="glance-title" style={{marginTop:18}}>③ 주간 고정 환율 (VND→KRW)</div>
          <div className="hint" style={{marginBottom:10}}>매주 새 주가 시작되면 자동으로 환율을 한 번 가져와 그 주에 영구히 잠급니다. 자동 조회가 실패한 주만 직접 입력해주세요 — <b>한번 저장된 주는 새 환율이 들어와도 다시 안 바뀝니다.</b> 1~6월 자료는 이미 원화로 입력된 과거치라 환율을 안 넣어도 됩니다.</div>
          <button type="button" className="copy-btn" style={{marginBottom:10}}
            onClick={()=>{
              const next = {...fxRates};
              Object.keys(next).forEach(wk=>{ if(wk < '2026-06-30') delete next[wk]; });
              persistFxRates(next);
            }}>1~6월 환율 전체 삭제</button>
          <table className="entries price-table">
            <thead><tr><th>주차</th><th>적용 기준일(금)</th><th>환율 (1동=?원)</th><th></th></tr></thead>
            <tbody>
              {fxWeeks.map(w=>(
                <tr key={w.monday}>
                  <td style={{fontSize:'10.5px'}}>{w.label}</td>
                  <td style={{fontSize:'10.5px',color:'var(--muted)'}}>{fridayBeforeWeek(w.monday)}</td>
                  <td>
                    <input type="number" step="0.0001" min="0" className="price-input"
                      placeholder={fxRates[w.monday]!==undefined ? String(fxRates[w.monday]) : '미설정'}
                      value={fxEdits[w.monday] ?? (fxRates[w.monday]!==undefined ? fxRates[w.monday] : '')}
                      onChange={e=>setFxEdits({...fxEdits, [w.monday]: e.target.value})}/>
                  </td>
                  <td style={{display:'flex',gap:6}}>
                    <button type="button" className="del-btn" style={{textDecoration:'none',fontWeight:700}}
                      onClick={()=>{
                        const v = fxEdits[w.monday];
                        if(v===undefined || v==='' || isNaN(Number(v))) return;
                        persistFxRates({...fxRates, [w.monday]: Number(v)});
                        setFxEdits(prev=>{ const n={...prev}; delete n[w.monday]; return n; });
                      }}>저장</button>
                    {fxRates[w.monday]!==undefined && (
                      <button type="button" className="del-btn" style={{color:'var(--bad)'}}
                        onClick={()=>{
                          const next = {...fxRates}; delete next[w.monday];
                          persistFxRates(next);
                        }}>삭제</button>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div className="inv-table-panel">
          <div className="glance-title">④ 재고 현황</div>
          <div className="toolbar no-print" style={{marginBottom:12}}>
            <select value={month} onChange={e=>setMonth(Number(e.target.value))}>
              {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}월 기준</option>)}
            </select>
            <button className="copy-btn" onClick={downloadCSV}>CSV 다운로드</button>
            <button className="copy-btn" onClick={()=>window.print()}>인쇄 / 미리보기</button>
          </div>

          <div className="page" style={{padding:'14px 16px',maxWidth:'none'}}>
            {rows.length===0 ? <div className="empty">아직 입고/판매 데이터가 없습니다.</div> : (
            <table className="report compact">
              <thead>
                <tr><th style={{textAlign:'left'}}>업체</th><th style={{textAlign:'left'}}>제품(SKU)</th><th>입고누계</th><th>판매누계</th><th>현재고</th><th>{month}월 입고</th><th>{month}월 판매</th></tr>
              </thead>
              <tbody>
                {rows.map(r=>(
                  <tr key={r.company+r.sku}>
                    <td className="lbl">{r.company}</td>
                    <td className="lbl">{r.name}</td>
                    <td>{fmt(r.inAll)}</td>
                    <td>{fmt(r.outAll)}</td>
                    <td className={r.remain<=10?'delta-down':''}>{fmt(r.remain)}</td>
                    <td>{fmt(r.inMonth)}</td>
                    <td>{fmt(r.outMonth)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            )}
            <div className="page-foot no-print">현재고가 10개 이하인 제품은 빨간색으로 표시됩니다.</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function StaffDrawer({entries, persist, visitors, persistVisitors, stockIn, persistStockIn, prices, onClose}){
  const [form,setForm] = useState({date:todayISO(),company:COMPANIES[0],sku:productsFor(COMPANIES[0])[0].code,channel:CHANNELS[0],qty:'',amount:''});
  const [err,setErr] = useState(null);
  const [saving,setSaving] = useState(false);

  // 합포장 주문 (여러 상품, 채널/날짜는 한 번만 선택)
  const [bundleMeta,setBundleMeta] = useState({date:todayISO(),channel:CHANNELS[0]});
  const [bundleLines,setBundleLines] = useState([{company:COMPANIES[0],sku:productsFor(COMPANIES[0])[0].code,qty:'',amount:''}]);
  const [bundleErr,setBundleErr] = useState(null);
  const [showBundle,setShowBundle] = useState(false);
  const [bundleSaving,setBundleSaving] = useState(false);

  const [vForm,setVForm] = useState({date:todayISO(),channel:CHANNELS[0],visitors:''});
  const [vErr,setVErr] = useState(null);
  const [vSaving,setVSaving] = useState(false);
  const [showVisitor,setShowVisitor] = useState(false);

  const [sForm,setSForm] = useState({date:todayISO(),company:COMPANIES[0],sku:productsFor(COMPANIES[0])[0].code,qty:'',note:''});
  const [sErr,setSErr] = useState(null);
  const [sSaving,setSSaving] = useState(false);
  const [showStockIn,setShowStockIn] = useState(false);

  // 같은 내용(날짜·업체·제품·채널·수량·금액)이 5분 이내에 이미 등록돼 있으면 중복 입력 가능성을 경고
  const [pendingDup,setPendingDup] = useState(null); // armed entry waiting for one more confirm click
  function isLikelyDuplicate(date, company, sku, channel, qty, amount){
    const cutoff = Date.now() - 5*60*1000;
    return entries.some(e=>
      e.date===date && e.company===company && e.sku===sku && e.channel===channel &&
      e.qty===qty && e.amount===amount &&
      Number(String(e.id).split('-')[0]) >= cutoff
    );
  }

  function handleCompanyChange(company){
    const opts = productsFor(company);
    const sku = opts[0].code;
    const price = getPrice(prices, company, sku, form.channel);
    setForm(f=>({...f, company, sku, amount: price!==null && f.qty ? String(Number(f.qty)*price) : f.amount}));
  }
  function handleSkuChange(sku){
    const price = getPrice(prices, form.company, sku, form.channel);
    setForm(f=>({...f, sku, amount: price!==null && f.qty ? String(Number(f.qty)*price) : f.amount}));
  }
  function handleChannelChange(channel){
    const price = getPrice(prices, form.company, form.sku, channel);
    setForm(f=>({...f, channel, amount: price!==null && f.qty ? String(Number(f.qty)*price) : f.amount}));
  }
  function handleQtyChange(qty){
    const price = getPrice(prices, form.company, form.sku, form.channel);
    setForm(f=>({...f, qty, amount: price!==null && qty ? String(Number(qty)*price) : f.amount}));
  }

  async function saveEntry(date, company, sku, channel, qtyN, amtN){
    setErr(null); setSaving(true);
    const skuObj = productsFor(company).find(p=>p.code===sku);
    const entry = {
      id: Date.now()+'-'+Math.random().toString(36).slice(2,7),
      date, company, channel,
      sku, skuName: skuObj ? skuObj.name : sku,
      qty:qtyN, amount:amtN
    };
    await persist([...(entries||[]), entry]);
    setForm(f=>({...f, qty:'', amount:''}));
    setSaving(false);
    setPendingDup(null);
  }

  async function handleAdd(e){
    e.preventDefault();
    if(!form.qty && !form.amount){ setErr('수량 또는 GMV 중 하나는 입력해주세요.'); return; }
    const qtyN = Number(form.qty)||0, amtN = Number(form.amount)||0;
    if(isLikelyDuplicate(form.date, form.company, form.sku, form.channel, qtyN, amtN)){
      setErr(null);
      setPendingDup({date:form.date, company:form.company, sku:form.sku, channel:form.channel, qtyN, amtN});
      return;
    }
    await saveEntry(form.date, form.company, form.sku, form.channel, qtyN, amtN);
  }
  async function confirmDuplicateAdd(){
    if(!pendingDup) return;
    const {date, company, sku, channel, qtyN, amtN} = pendingDup;
    await saveEntry(date, company, sku, channel, qtyN, amtN);
  }
  async function handleDelete(id){
    await persist((entries||[]).filter(e=>e.id!==id));
  }
  const recent = [...entries].sort((a,b)=> b.date.localeCompare(a.date) || (b.id>a.id?1:-1)).slice(0,12);

  // ---- 합포장 주문 핸들러 ----
  function updateBundleLine(idx, patch){
    setBundleLines(lines => lines.map((l,i)=>{
      if(i!==idx) return l;
      const next = {...l, ...patch};
      if(patch.company){ next.sku = productsFor(patch.company)[0].code; }
      const price = getPrice(prices, next.company, next.sku, bundleMeta.channel);
      if(price!==null && (patch.qty!==undefined || patch.company || patch.sku) && next.qty){
        next.amount = String(Number(next.qty)*price);
      }
      return next;
    }));
  }
  function addBundleLine(){
    setBundleLines(lines => [...lines, {company:COMPANIES[0],sku:productsFor(COMPANIES[0])[0].code,qty:'',amount:''}]);
  }
  function removeBundleLine(idx){
    setBundleLines(lines => lines.length<=1 ? lines : lines.filter((_,i)=>i!==idx));
  }
  async function handleBundleSubmit(){
    const validLines = bundleLines.filter(l=>l.qty || l.amount);
    if(validLines.length===0){ setBundleErr('상품을 최소 1개 이상, 수량 또는 GMV와 함께 입력해주세요.'); return; }
    setBundleErr(null); setBundleSaving(true);
    const orderId = 'BUNDLE-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,5);
    const newEntries = validLines.map((l,idx)=>{
      const skuObj = productsFor(l.company).find(p=>p.code===l.sku);
      return {
        id: Date.now()+'-'+Math.random().toString(36).slice(2,7)+'-'+idx,
        date:bundleMeta.date, company:l.company, channel:bundleMeta.channel,
        sku:l.sku, skuName: skuObj ? skuObj.name : l.sku,
        qty:Number(l.qty)||0, amount:Number(l.amount)||0,
        orderId
      };
    });
    await persist([...(entries||[]), ...newEntries]);
    setBundleLines([{company:COMPANIES[0],sku:productsFor(COMPANIES[0])[0].code,qty:'',amount:''}]);
    setBundleSaving(false);
  }

  async function handleAddVisitor(e){
    e.preventDefault();
    if(!vForm.visitors){ setVErr('방문자 수를 입력해주세요.'); return; }
    setVErr(null); setVSaving(true);
    const rec = {
      id: Date.now()+'-'+Math.random().toString(36).slice(2,7),
      date:vForm.date, channel:vForm.channel, visitors:Number(vForm.visitors)||0
    };
    await persistVisitors([...(visitors||[]), rec]);
    setVForm(f=>({...f, visitors:''}));
    setVSaving(false);
  }
  async function handleDeleteVisitor(id){
    await persistVisitors((visitors||[]).filter(v=>v.id!==id));
  }
  const recentV = [...(visitors||[])].sort((a,b)=> b.date.localeCompare(a.date) || (b.id>a.id?1:-1)).slice(0,8);

  function handleStockCompanyChange(company){
    setSForm(f=>({...f, company, sku: productsFor(company)[0].code}));
  }
  async function handleAddStockIn(e){
    e.preventDefault();
    if(!sForm.qty){ setSErr('입고 수량을 입력해주세요.'); return; }
    setSErr(null); setSSaving(true);
    const skuObj = productsFor(sForm.company).find(p=>p.code===sForm.sku);
    const rec = {
      id: Date.now()+'-'+Math.random().toString(36).slice(2,7),
      date:sForm.date, company:sForm.company, sku:sForm.sku, skuName: skuObj?skuObj.name:sForm.sku,
      qty:Number(sForm.qty)||0, note:sForm.note.trim()
    };
    await persistStockIn([...(stockIn||[]), rec]);
    setSForm(f=>({...f, qty:'', note:''}));
    setSSaving(false);
  }
  async function handleDeleteStockIn(id){
    await persistStockIn((stockIn||[]).filter(s=>s.id!==id));
  }
  const recentS = [...(stockIn||[])].sort((a,b)=> b.date.localeCompare(a.date) || (b.id>a.id?1:-1)).slice(0,8);

  return (
    <div className="drawer no-print">
      <button className="close-btn" onClick={onClose}>✕</button>
      <button type="button" className="bundle-toggle" onClick={()=>setShowBundle(s=>!s)}>
        {showBundle ? '− 합포장 주문 닫기' : '+ 합포장 주문 (상품 2개 이상)'}
      </button>

      {showBundle && (
        <div className="bundle-panel">
          <div className="hint" style={{marginBottom:14}}>날짜·채널은 한 번만 고르고, 주문에 들어간 상품을 한 줄씩 추가하세요. 등록하면 같은 주문번호로 자동 묶입니다.</div>
          <div className="field"><label>날짜</label>
            <input type="date" value={bundleMeta.date} onChange={e=>setBundleMeta({...bundleMeta,date:e.target.value})}/></div>
          <div className="field"><label>판매 채널</label>
            <select value={bundleMeta.channel} onChange={e=>setBundleMeta({...bundleMeta,channel:e.target.value})}>
              {CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}
            </select></div>

          <div className="bundle-lines">
            {bundleLines.map((line,idx)=>(
              <div className="bundle-line" key={idx}>
                <div className="bundle-line-no">{idx+1}</div>
                <select value={line.company} onChange={e=>updateBundleLine(idx,{company:e.target.value})}>
                  {COMPANIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <select value={line.sku} onChange={e=>updateBundleLine(idx,{sku:e.target.value})}>
                  {productsFor(line.company).map(p=><option key={p.code} value={p.code}>{p.name}</option>)}
                </select>
                <input type="number" min="0" placeholder="수량" value={line.qty} onChange={e=>updateBundleLine(idx,{qty:e.target.value})}/>
                <input type="number" min="0" placeholder="GMV(천동)" value={line.amount} onChange={e=>updateBundleLine(idx,{amount:e.target.value})}/>
                <button type="button" className="bundle-remove" onClick={()=>removeBundleLine(idx)} disabled={bundleLines.length<=1}>✕</button>
              </div>
            ))}
          </div>
          <div className="hint" style={{marginTop:6}}>GV온라인·Shopee·TikTok은 단가가 등록돼 있으면 수량 입력 시 GMV가 자동 채워집니다. B2B는 항상 직접 입력하세요.</div>
          <button type="button" className="copy-btn" style={{marginTop:8}} onClick={addBundleLine}>+ 상품 추가</button>
          <button type="button" className="submit-btn" style={{marginTop:8}} disabled={bundleSaving} onClick={handleBundleSubmit}>{bundleSaving?'등록 중...':'합포장 주문 등록'}</button>
          {bundleErr && <div className="hint" style={{color:'var(--bad)'}}>{bundleErr}</div>}
          <div className="drawer-divider"></div>
        </div>
      )}

      <h3>주문 입력</h3>
      <div className="hint" style={{marginBottom:14}}>한 주문에 상품이 하나뿐일 때 빠르게 입력합니다. 금액은 베트남 동(VND, 천동 단위)으로 입력하세요 — 보고서에는 그 주 환율로 자동 환산된 원화가 표시됩니다. GV온라인·Shopee·TikTok은 단가가 등록돼 있으면 GMV가 자동 계산됩니다.</div>
      <form onSubmit={handleAdd}>
        <div className="field"><label>날짜</label>
          <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} required/></div>
        <div className="field"><label>업체명</label>
          <select value={form.company} onChange={e=>handleCompanyChange(e.target.value)}>
            {COMPANIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select></div>
        <div className="field"><label>제품(SKU)</label>
          <select value={form.sku} onChange={e=>handleSkuChange(e.target.value)}>
            {productsFor(form.company).map(p=><option key={p.code} value={p.code}>{p.name}</option>)}
          </select></div>
        <div className="field"><label>판매 채널</label>
          <select value={form.channel} onChange={e=>handleChannelChange(e.target.value)}>
            {CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}
          </select></div>
        <div className="field"><label>수량</label>
          <input type="number" min="0" placeholder="0" value={form.qty} onChange={e=>handleQtyChange(e.target.value)}/></div>
        <div className="field"><label>GMV (천동){getPrice(prices,form.company,form.sku,form.channel)!==null && ' — 자동계산됨, 수정 가능'}</label>
          <input type="number" min="0" placeholder="0" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></div>
        <button type="submit" className="submit-btn" disabled={saving}>{saving?'저장 중...':'+ 주문 입력'}</button>
      </form>
      {err && <div className="hint" style={{color:'var(--bad)'}}>{err}</div>}
      {pendingDup && (
        <div className="dup-warning">
          방금 같은 내용(날짜·업체·제품·채널·수량·금액)이 이미 입력된 것 같습니다. 그래도 등록할까요?
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button type="button" className="submit-btn" style={{flex:1}} onClick={confirmDuplicateAdd} disabled={saving}>{saving?'등록 중...':'그래도 등록'}</button>
            <button type="button" className="copy-btn" onClick={()=>setPendingDup(null)}>취소</button>
          </div>
        </div>
      )}

      <table className="entries">
        <thead><tr><th>날짜</th><th>업체</th><th>제품</th><th>채널</th><th>수량</th><th>GMV(천동)</th><th>주문번호</th><th></th></tr></thead>
        <tbody>
          {recent.map(e=>(
            <tr key={e.id}>
              <td>{e.date}</td><td>{e.company}</td>
              <td style={{fontSize:'11px'}}>{e.skuName||e.sku||'—'}</td>
              <td><span className={"chip "+CHAN_KEY[e.channel]}>{e.channel}</span></td>
              <td>{fmt(e.qty)}</td><td>{fmt(e.amount)}</td>
              <td style={{color:'var(--muted)',fontSize:'10.5px'}}>{e.orderId||'—'}</td>
              <td><button className="del-btn" onClick={()=>handleDelete(e.id)}>삭제</button></td>
            </tr>
          ))}
        </tbody>
      </table>

      <div className="drawer-divider"></div>
      <button type="button" className="bundle-toggle" onClick={()=>setShowVisitor(s=>!s)}>
        {showVisitor ? '− 방문자 수 입력 닫기' : '+ 방문자 수 입력 (가끔만 사용)'}
      </button>
      {showVisitor && (
        <div className="bundle-panel">
          <div className="hint" style={{marginBottom:14}}>채널 트래픽 리포트를 보고 날짜별로 채워주세요. 전환율(CVR) 계산에 쓰입니다.</div>
          <form onSubmit={handleAddVisitor}>
            <div className="field"><label>날짜</label>
              <input type="date" value={vForm.date} onChange={e=>setVForm({...vForm,date:e.target.value})} required/></div>
            <div className="field"><label>채널</label>
              <select value={vForm.channel} onChange={e=>setVForm({...vForm,channel:e.target.value})}>
                {CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}
              </select></div>
            <div className="field"><label>방문자 수</label>
              <input type="number" min="0" placeholder="0" value={vForm.visitors} onChange={e=>setVForm({...vForm,visitors:e.target.value})}/></div>
            <button type="submit" className="submit-btn" disabled={vSaving}>{vSaving?'저장 중...':'+ 방문자 수 입력'}</button>
          </form>
          {vErr && <div className="hint" style={{color:'var(--bad)'}}>{vErr}</div>}

          {recentV.length>0 && (
            <table className="entries">
              <thead><tr><th>날짜</th><th>채널</th><th>방문자</th><th></th></tr></thead>
              <tbody>
                {recentV.map(v=>(
                  <tr key={v.id}>
                    <td>{v.date}</td>
                    <td><span className={"chip "+CHAN_KEY[v.channel]}>{v.channel}</span></td>
                    <td>{fmt(v.visitors)}</td>
                    <td><button className="del-btn" onClick={()=>handleDeleteVisitor(v.id)}>삭제</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      <div className="drawer-divider"></div>
      <button type="button" className="bundle-toggle" onClick={()=>setShowStockIn(s=>!s)}>
        {showStockIn ? '− 입고 입력 닫기' : '+ 입고 입력 (가끔만 사용)'}
      </button>
      {showStockIn && (
        <div className="bundle-panel">
          <div className="hint" style={{marginBottom:14}}>한국에서 제품이 입고될 때 등록하세요. 재고 확인(현재고 = 입고 누계 − 판매 누계) 계산에 쓰입니다.</div>
          <form onSubmit={handleAddStockIn}>
            <div className="field"><label>날짜</label>
              <input type="date" value={sForm.date} onChange={e=>setSForm({...sForm,date:e.target.value})} required/></div>
            <div className="field"><label>업체명</label>
              <select value={sForm.company} onChange={e=>handleStockCompanyChange(e.target.value)}>
                {COMPANIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select></div>
            <div className="field"><label>제품(SKU)</label>
              <select value={sForm.sku} onChange={e=>setSForm({...sForm,sku:e.target.value})}>
                {productsFor(sForm.company).map(p=><option key={p.code} value={p.code}>{p.name}</option>)}
              </select></div>
            <div className="field"><label>입고 수량</label>
              <input type="number" min="0" placeholder="0" value={sForm.qty} onChange={e=>setSForm({...sForm,qty:e.target.value})}/></div>
            <div className="field"><label>메모 (선택)</label>
              <input type="text" placeholder="예: 한국 본사 출고분" value={sForm.note} onChange={e=>setSForm({...sForm,note:e.target.value})}/></div>
            <button type="submit" className="submit-btn" disabled={sSaving}>{sSaving?'저장 중...':'+ 입고 입력'}</button>
          </form>
          {sErr && <div className="hint" style={{color:'var(--bad)'}}>{sErr}</div>}

          {recentS.length>0 && (
            <table className="entries">
              <thead><tr><th>날짜</th><th>업체</th><th>제품</th><th>수량</th><th>메모</th><th></th></tr></thead>
              <tbody>
                {recentS.map(s=>(
                  <tr key={s.id}>
                    <td>{s.date}</td><td>{s.company}</td>
                    <td style={{fontSize:'11px'}}>{s.skuName||s.sku}</td>
                    <td>{fmt(s.qty)}</td>
                    <td style={{color:'var(--muted)',fontSize:'10.5px'}}>{s.note||'—'}</td>
                    <td><button className="del-btn" onClick={()=>handleDeleteStockIn(s.id)}>삭제</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      <CorrectionPanel entries={entries} persist={persist}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
